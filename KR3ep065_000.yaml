front:
  text: 序梁溪汪藝香先生遜清良醫也學術淵博識見高超生死輕重診斷如神求治者踵相接至危至險之症一經著手罔不轉危為安化險為夷洵我中醫界傑出之人才醫案透徹詳明論病理切中肯綮用藥靈通活變頗多發明惜其醫案散佚無多為一大缺憾茲將搜羅所得録付本刊逐期披露供給同志研究雖屬零珠碎玉而於醫林之中亦不無小補云爾
  hash: sha256:e4c373be226b5e20ab2e016e4dd4f128cdf94a4fe7222ebf09a30fcd96745088
  markers:
  - {type: 'tls:head', offset: 0, content: '', id: KR3ep065_jc_000-d2.h1s1}
body:
  text: 上案齒垢舌黃積之據也熱壯汗少邪之徵也腹硬而痛屢圊便少可以下矣脈浮而數膚灼舌乾可以汗矣症恰七日伏邪為患用下不可以承氣用汗不可以麻桂姑擬辛涼開表微苦通里如得汗下雙暢或可不致昏閉薄荷浮萍葛根豆豉光杏仁鮮佛手枳殼實花檳榔竹瀝滾痰丸玉樞丹案夏受暑邪至秋而發隔季而病是名曰伏病之難退正理此耳邪之所伏必在募原夫募原乃隔膜之稱居於少陽陽明之間如伏邪歸入少陽則為寒熱交作之正瘧走入陽明則為不寒但熱之疸瘧是症始起微寒不栗熱退不清的系募原之證中途轉為連熱因其挾積邪並陽明與積合病故也而今積滯已去暑濕未化仍然盤踞陽明隨衛氣以出入衛為陽氣行於周身者也既為暑濕相客其間必有聚處至其所則起過其所則伏脈形細數汗出不快神倦懶語有時譫言病經十有七日暑濕之未化正由汗之不暢而汗也者乃陽氣陰津蒸化濁邪而出際此氣陰俱傷蒸化乏力欲其有汗難矣姑從暑濕著想惟以清泄為主法半夏淡芩雅連西洋參黑山梔豆豉薄荷茯苓神連翹竹茹石菖蒲末濂珠末川貝母益元散案夏受暑邪秋必成瘧瘧類有四治宜分晰此症始而間日起伏先為寒熱不分繼則寒能戰栗熱可退清今變但熱不寒的是伏暑之邪從募原走少陽而轉入陽明竟成疸瘧重症嘗讀古聖遺訓陽明之瘧有白虎加桂一法姑師其意桂枝蘆根知母淡芩黑山梔豆豉通草滑石鬱金佛手案時症三候例當邪焰已殺正氣漸復方為向安之象詎料暑濕積三寇鼎立不解竊恐奮勇之師無糧不能前矣姑效淮陰背水一法至於成敗利鈍非余所能逆料也南沙參淡豆豉桔梗薄荷滑石黃芩川朴佛手鬱金枳實檳榔大黃玉樞丹西牛黃案初診風寒暑濕燥火謂之六淫六淫即謂之六邪六邪之中暑濕兩字每多連呼者良有暑為天之氣而濕為地之氣天之暑熱一動地之濕濁自騰人在氣交中強者可御弱者易受從口鼻吸入內伏而發秋涼引動病於少陽則為瘧即內經所謂瘧不離膽是也病於陽明則寒不能栗熱不退清雖亦名瘧然必嘔噦煩悶胸痞此症今五日矣見象大概如是而以脈象參之左部見弦右手濡數弦則似有轉瘧之勢濡則仍居於胃胃為中土又為坤地地氣上騰天氣不肅猶如隆冬之雲霧迷空日光被蔽胸中清曠之地變成煙塵之區煩躁難過夜不安寐勢當然耳刻交成敗之際正勝則邪達自可日臻康壯邪勝則正負必致內陷神昏扶正本非其時達邪誠為要事古云急者先治旨哉斯言但暑濕皆傷氣分暑居濕下清之徒然濕遏熱上開泄為主且以苦辛使其氣之升降溫苦解其濕之瀰漫輕淡宣其蘊伏如能應手而效尚屬立陳布兵之時何能一鼓掃蕩望其邪勢折挫能免變幻幸焉桔梗光杏仁檀香香附枳殼實檳榔藿香川朴豆豉滑石蘇葉蔻仁鬱金末石菖蒲末二末先服二診暑之中人也壯者感而即發虛者著而蘊伏內舍於骨髓外舍於分肉不能傳送暑邪達外必待秋秋涼冬寒相搏而出發於霜降前者為輕病於霜降後者為重夫暑必挾濕二者皆傷氣分氣能開合邪隨開而為起合而為伏氣為暑濕所傷則開合失其常度肺氣合則煩悶胃氣合則嘔噦腸氣合則不便脾氣合則膚冷故昨用桔杏以開肺檀附以開胃枳檳專流於三焦以通腸藿朴以開脾郁菖以開痹豉滑以蕩胸中之熱氣蘇蔻以祛濕之穢氣而今氣開未全暑濕未清所以症象衰減不能不解也仍慮昏蒙之險再當擴充前方桑葉豆豉桔梗光杏仁鬱金藿梗佛手川朴蔻仁花檳榔枳殼實竹瀝達痰丸案不寒獨熱今恰半月刻見神識昏迷譫語無音面色青晦目有白翳六脈濡數而浮舌苔灰黃似腐熱不外揚渴不多飲此由中陽式微砥柱無權暑濕不能達外反致內陷古云陷者舉之東垣所謂補中益氣是也扶正達邪本屬善治無如邪固可達痰濕難化嘗考薛葉諸家每以辛香解逐由此而論扶正為督戰之師達邪作剿賊之將然危篤若是百中圖一而已商用別直參河水煎濃湯調服下藥明雄精陳膽星豬牙皂當門麝香四味研末調服案初診熱勢輕劇無序他症無起伏即謂之起伏惟伏邪能起伏者須從伏字著意蓋伏即進起即出而進者能出人身之氣道晝夜運行循環不息晝行二十五度夜行二十五度以分陰陽今因伏暑內蓄邪與衛氣並居雖不能阻其往來之道路而必隨衛氣以出入至其所則起過其所則伏若論輕重長短視其邪之多寡正氣之強弱為轉移其中夾他病須隨症參切是症今恰半月熱仍夜甚煩悶乾噦脘腹板痛遍體透斑斑色紅紫固是正理兼有晦青不澤者誠非佳兆脈來濡滑而數舌苔淡黃而垢良由稟賦本虧病初之際經事適來陰氣暗泄邪熱乘襲當此濁邪與積膠錮之時宜出大隊軍兵所謂無糧之師貴於速戰姑用大黃黃連瀉心合犀角大青之法蓋斑與疹㾦不同斑宜清化古人早已示後原可一例施治未識符否備商生軍雅連淡芩法半夏犀角大青葉黑山梔鬱金薄荷茅根肉苦杏仁連翹殼摩枳實二診治病猶如敵寇用藥宛若用兵應戰則戰當守則守是病邪積膠錮而正陰素虧無糧之師貴乎速戰故昨用大黃黃連合犀角大青之法幸得便已數行腹硬較軟斑色之紅稍退脈象仍帶滑數舌轉淡黃而露底望之色干紅刺密布想由腸胃之積滯下而未清身中之陰液日傷一日有限之陰液既傷難勝無情之邪熱外來之病竟似盜寇逐去即安當此大戰之際對敵之寇苟能散而不聚可無猖獗之勢矣摩犀角鮮生地赤芍丹皮鮮石斛元參茅根肉瓜蔞仁生梔子連翹摩枳實竹茹摩花檳榔案初診經曰夏傷於暑秋必成瘧又曰暑必夾濕夫瘧雖不離少陽一經然與咳相類臟腑皆有贅在素問是症始起寒雖不栗熱可退清仍屬膽病病尚未楚即加跋涉道途不慎於食不安於居所以轉加腹撑便泄形疲力乏今診脈象左手弦數右部濡滑舌苔薄白厄逆頻見納食頗減痰出黏膩細思肝膽表裡相應又為甲乙之木膽病則肝亦病脾胃本屬相聯又為戊己之土脾病則胃亦病迄今寒熱止而脈見弦數者肝臟病也腹撑便泄火升面赤是其徵也納少厄逆乃木剋土位膽脾不能同升肝胃焉能獨降脈見濡滑者脾胃病也便泄數多納不能飯是其徵矣中少砥柱氣竄上下是土被木侮左道升之太過右路降之不及蓋萬物皆有五行論病首先重此金生水則肺腎同旺水生木則肝得滋養木生火則心主安寧火生土則脾胃充足土生金則人病何來名曰相生金剋木則肺肝乖違木剋土則脾胃受侮土剋水則腎水枯稿水剋火則心主無權火剋金則肺損源絶名曰相剋克無多見一臟一腑已屬難療人之至要必在脾胃所以自古聖人皆以後天為本脾為營血之源胃為衛氣之根方書所謂能納者尚有返還之意不能納者徒恃藥力無功前論木剋土位為一忌納食迅減為再忌便泄加厄為三忌兩脈弦滑為四忌況年屆杖國輕重善惡毋庸言而可喻矣姑擬一法以圖弋獲人參於術茯苓橘葉白柿蒂吳萸汁炒白芍枇杷葉竹茹木香香稻葉刀豆子燕窩湯摩檀香二診經曰脈為血府百骸貫通臟腑配合可推病情位分三部息分九候左寸屬心膻中配之左關屬肝膽為其腑左尺屬腎小腸同居右寸屬肺胸中配之右關屬脾胃為其腑右尺屬腎大腸同居此言其臟腑之配合也又云肝生於左肺臟於右心部於表腎治於裡脾胃位中膽寓於肝小腸在大腸之上膀胱傍二腎之側此言其臟腑之部位也今診左寸無神心血久已不足左關獨弦肝膽氣火有餘左尺不鼓是腎氣之衰弱右寸微滑肺經素有貯痰右關軟濡脾胃運納無權右尺乏力乃腎陽之式微際此少腹攻撑下趨則便泄數多上逆則氣升胸窒暮夜身熱兩顴先見戴陽納惟湯飲米粒不能咽下慵於語言聲啞不揚此皆今日病象初診因其厄逆不已便泄不止而用六君柿蒂之法據述藥病相當頗有轉機之意無如高年元弱變端不一前案已言木剋土位不能納者徒於傷寒邪積盤踞之際雖用承氣攻伐聖人尚言急下存正所以七日不食有腸胃固絶之戒是症始起為瘧疾繼則諸事繁冗食物不純直至不能支持而後已病象日變元正日乏竟蹈無胃不治一端餘本膚才淺見焉能謬膺重任既承推愛勉再搜索枯腸一則以盡下愚之忱一則以邀彼蒼之佑鉛刀襪線盡在於斯即請明眼採裁人參於白朮金石斛白芍防風根五穀蟲桑葉丹皮竹茹香粳谷荷葉蒂伽南香牡蠣橘白三診泄則傷脾久則必傷於腎蓋腎主二陰權亦不小所以古人立胃關煎脾腎雙補之法脾為後天之本腎為先天之源脾傷則運化乏力胃納應減胃為陽土而主容納脾為陰土專司磨運一納一運互相資生至於腎經一臟內藏命火火如充足方能熟腐水穀生化氣血而今時寒烘熱已退固是暑濕化解之徵無奈泄之不休將及兩月飲食日減心宕顴赤脈來細弦右尺虛散舌質淡紅滿布白疳即此見端已有藥不勝病之憂矧十日前陡增咳嗽氣促不但用藥有顧此失彼之嘆抑且肺金因咳再傷土本生金金為水母循環受傷虛莫能支漫擬引火歸源猶如釜底添薪如能土仗火旺泄少谷多冬行春令或有望耳東西洋參砂仁炒於白朮朱拌茯苓神薑渣炒白芍附子湯炙龜板麩炒山藥菟絲子川貝炒秫米血鹿片蛤蚧尾四神丸案初診夏邪秋髮病已兩候始則微寒繼則足冷熱勢起伏間有輕重初飲頗多今反不渴每痰必嗽每醒必汗舌苔滿布淡黃脘腹按之作痛此皆伏邪夾積夾濕重症本有之事無如六脈細數不耐重按面色㿠白天庭青暗詢之正元素乏未病氣鬱是以邪內鬱而不得外達並從虛而恐致內陷蓋時症一候之中難分勝負兩候之內可見成敗刻已將及三候元正日有不支之形邪客竟無纖毫解退之機由此而論雖用開泄疏化之法竊恐其鞭雖長其腹難及桑葉豆卷薄荷梗光杏仁桔梗鬱金滑石川朴佛手枳殼花檳榔石菖蒲二診經曰因於暑汗煩則喘喝靜則多言體若燔炭汗出而散可見六淫之邪不從表汗不得外越前因暑濕混淆氣機窒痹邪郁不達濕遏不宣以致足冷身熱起伏輕重不一不咳有痰臥醒有汗舌苔淡黃滿布胸悶腹硬作痛前用開泄上中疏化邪濕竟得大汗遍體㾦乃密布熱勢居然退清舌色已化七八脈緩而胸次開展無一不是佳景惟腑道日久未通臍間自覺阻滯顯系無形之暑濕可以表解有質之宿垢必從里通第症交三候稟賦素虛難任承氣大攻大伐且非急下陽明之際既從無形而退仍當專事氣分古人有言曰治積先治氣氣行積自去此症殆有是焉至於勞復食復兩端自宜存之左卷桑葉光杏仁桔梗川朴佛手蔻仁枳殼石菖蒲香附通草花檳榔竹瀝達痰丸案人之智識靈慧皆本乎心心為君主之官心包代君用事諸病之糊塗囈語無非邪熱痰穢矇蔽心包心包用藥難表難下惟取精靈之品佐以滌痰之味護內攘外清熱開塞症方五日肢冷身熱頓為神識不慧糊語不休苔黃邊白脈象滑數此係暑濕入里濕為熱蒸成痰暑為痰遏難解痰熱迷竅穢濁上蒙直迫心包君主無權閉脫之變勢恐接踵而至生山梔連翹心竹葉心淡芩朱滑石朱燈心石菖蒲鬱金川貝天竺黃另麝香西黃雄精玳瑁膽星以上五味研末先服案初診肢寒身熱三日已見苔黃溲赤獲汗而勢不衰非風寒也伏邪也昨夜煩懊異常人事模糊今午忽爾手舞足蹈目瞪不語此名謂閉猶如天時鬱勃六合閉塞風電交加雖經針刺稍定然有形之痰與無形之暑膠結如樞紐不能遽化現閉極生風勢有外脫之虞欲不外脫須開內閉再詢之數日未便按腹板硬呼痛又兼積滯內阻用藥可謂掣肘矣生山梔連翹竹葉薄荷鉤鉤膽星天竺黃朱燈心碧玉散鬱金枳實竹瀝滾痰丸鮮荷葉包入煎至寶丹研細用細葉菖湯送下二診症經七日十齡童子已作一候矣過候而諸恙不退者尤非所宜蓋時症以一候為限期如候上得松其病漸退如候上增劇其勢必有進無退即如此症閉象雖開迷糊不清手舞雖定煩懊不平腹時叫痛按之板硬脈來渾滑而帶數舌苔灰黃而垢膩從其起伏而論不見咳嗽的是暑邪發於募原因其積滯內阻所以直抵陽明痰蒙宮城開手即閉閉開舞定而他款不退時輕時重猶如邪勢滔天抑且面色青晦厥陰所主而厥陰乃至陰之地內藏風火邪如乘入明早寅卯之間恐有非常之變黑山梔豆豉連心翹竹心雞蘇散川貝鬱金枳實上生軍犀角尖另西黃辰砂礞石石菖蒲以上四味研末先服三診胃為倉廩之官又曰水穀之海觀此經義皆屬專指積滯而論如概而言之不惟水穀積滯即痰熱邪火至此皆可一下而降所以無論疸瘧傷寒瘟疫濕溫病及陽明俱可以下建功甚速此症因其始起即閉邪火痰積無一不具昨用斬關奪門之將復入清心宣竅之味宛如兵家之兩路夾攻水陸並進幸得桴鼓相應大為快事但邪勢猖獗之際安能驟平餘波充斥不可不防黑山梔豆豉連翹薄荷摩犀尖上生軍竹茹蘆根石菖蒲鬱金枳實萬氏清心丸四診六氣為病望問聞切四字不可缺一即如此症脈象舌色各居其半為病確據推之經義即是望切兩字寒熱虛實輕重出入絲毫不錯復以一切見證合而論之無微不顯脈數已和滑象未退舌黴已化苔黃尖絳的是邪火漸息痰滯未清所以神迷好臥偶而狂起臍之右旁按之尚痛也當用瀉心湯合白虎法兩者並進一清其在經之熱一通其在腑之積經腑同治邪積悉化病魔自退矣法半夏黃芩雅連生軍玉泉散知母黑山梔豆豉連翹茅根竹黃茹川貝鬱金另西黃琥珀石菖蒲月石四味研末先服案年已古稀之外氣液無有不虛病患暑濕竟成疸瘧今已十有三日熱勢雖衰尚未退清脈象小數舌色光紅有時神識不清口渴頗喜湯飲濕因液虧而化暑由氣虛尚逗大凡暑病之不寒獨熱者陽明症也經所謂陰氣先傷陽氣獨發良有意耳刻下虛多於實正負於邪古法本有扶正達邪之治然胃氣不振托邪難盡胃陰不醒飲食難進竊恐病去元敗臨崖勒馬收韁而有不及之嘆南沙參金石斛香稻葉橘白竹茹川貝蘆根知母益元散元參心連翹心案疸瘧一症傳書甚少仲祖為歷代之聖師尚無專書不過列於諸瘧門中似敘似釋亦未立方後世喻嘉言立甘寒一法此治疸瘧立論現之論疸瘧者不外暑濕二字暑必傷氣症甫四日當時凜發熱自午後而起徑至黎明得暢汗而緩以後至時復作卻不甚重汗亦不多此非邪達勢輕乃邪伏募原氣為邪遏不復宣越所以昨日來勢又甚甚則胸悶煩躁嘔惡不止脈象渾滑而數舌苔黃厚而膩數日未便腹脘覺痛良由暑濕內蘊為新寒新積觸發積系穀食所成而必在胃胃為多氣多血之鄉胃既受病則氣血不得流暢邪必因之而入是以日輕日重成起伏也恐淹纏生變法半夏淡芩雅連蘇葉乾薑川朴蔻仁枳殼實花檳桑葉桔梗光杏闢瘟丹案小兒蒸變之後臟腑完備喜怒自如其生長猶如草木之欣欣向榮惟小兒體屬純陽必得純陰之乳以配之草木初栽根浮必得濡潤之水以溉之若曝於日必見枯萎此小兒受熱變經之喻也年方四周玉液初斷進谷未久稟賦之陽蓰倍於陰概可知焉是症始聞火驚繼嚇鑼鳴夜即身熱誤會受寒褥以羊裘被以重棉陡發驚搐氣升痰鳴四肢不溫而面色青灰六脈沉而微形弦數兩目直視二便皆窒呼之不應飲之不啜此名驚閉蓋閉乃手少陰之病驚乃足厥陰之疴驚則氣亂陽升閉則氣窒陽伏驚由熱甚生風閉由火蒙痰蔽因驚而經絡牽掣從閉而智識全無驚而神氣清徹者方為輕兆閉在驚厥之後者則為重候大抵小兒之病最怕其驚五臟之疾心可不犯歷考古人治驚以鎮治閉以開再清其膈間氤氳之痰熱或可轉險為夷然雖取法聖賢特恐病似祖鞭矣羚羊角雙鉤鉤山梔連翹心鮮薄荷朱燈心石菖蒲竹黃葉川貝膽星淡芩龍齒礞石至寶丹案童女風溫今恰一月中途雖則轉輕而濁邪未清餘燼復焰身熱又起咳嗽無汗大便不行脈弦數而帶滑舌淡黃而尖絳此由邪積夾痰互阻肺胃表裡既無出路自然鬱蒸化熱蒸痰動風風藏於肝痰生於胃胃為十二經之總路肝為東方乙木胃氣不降風火上升所以至其時而益甚驚厥生焉刻雖針刺便行然神識未清手搐目竄語言不出胸中本屬清曠之地而今轉為塵霧之天機竅被其矇蔽經絡被其阻痹也勢在險峻難免復驚之變羚羊角鉤鉤竹黃山梔連翹心淡芩薄荷大力子川貝殭蠶茅根珍珠母另礞石膽星石菖蒲麝香金箔風化硝六味研末竹油調服案乳兒未及載半痃瘧已延年餘幸而脾胃強壯後天有權仲春得以向愈詎知感冒風溫染成頓咳邇來熱甚三日即發驚厥目竄睨視搐搦反張哭不轉聲涕淚皆無諸疑畢集無端不作作後神識似慧而屢發不已良由病雜遷延氣陰俱傷氣傷則絡脈空乏陰傷則木失涵養化無情之風火夾有形之痰濁蒙竅襲絡夫絡為小路竅乃空洞非邪不進非虛不入所謂邪行如水虛處則受也思其既進不易外出所服藥餌苟非直抵病所安能轉危為吉是故為醫者不得不傾心吐膽搜索枯腸勉擬一方以期化險為夷珍珠母生鐵落白石英鉤鉤竹黃殭蠶川貝薄荷膽星絲瓜絡龍齒另礞石蠍尾玳瑁金箔以上四味研末先服案驚不離肝閉不離心熱入於裡宜開痰積阻中自然開之不應既屬有形之阻必當通導於裡以望天氣一開地氣乃降或可挽回金礞石三錢上生軍三錢肥皂莢四寸乾地龍三條干薄荷一錢當門子三釐化服案初診多病多虛之體而患時令風溫之症始則寒栗而熱繼則咳嗽多痰今方三日忽然熱退咳平面紅轉白痰無吐出旁觀者皆為病去之象主病者亦因多病多虛之體雖患時症不過爾爾詎意神識漸漸不慧糊語喃喃不已及診其脈細數無神左手搏指舌苔浮白大便溏泄分明邪乘虛陷痰蒙內竅勢屬至危姑擬扶正達邪護里宣開一法古人云虛人善變此症殆有是焉參葉前胡桔梗牛蒡射干制殭蠶鬱金石菖蒲膽星天竺黃豬苓萬氏清心丸二診今日便瀉竟有二十數之多自然病情尤增變幻陰液由此而涸風陽從斯而升日昨之神識一毫未慧反加撮空痙厥幸而厥少於痙正氣尚留一線所以厥而復醒古云撮空一症非大實即大虛實則神明被逼虛則神明渙散此症實耶虛耶逼耶散耶何待智者言而喻耶危篤若是雖無把握焉能聽其自然勉擬精靈護里三甲潛陽輔以熄風滌痰之品以望百中圖一而已龜板鱉甲牡蠣洋參鉤鉤石決白蒺藜制殭蠶天竺黃膽星石菖蒲另濂珠玳瑁金箔月石四味研末服三診今日痙厥頓止昨方難言不效然一波未平一波又起令人有應接不暇之勢午後忽變似祟之附確似癲狂之象內經曰重陽則狂重陰則癲陰者痰之類陽者火之謂兩日前神識已糊勢必痰火駕輕就熟而入冀其返正得奏線效再觀休咎西洋參辰茯神龍齒青蛤散遠志膽星竹黃玉泉散知母鉤鉤另濂珠西黃玳瑁硃砂金箔以上五味共研末服四診狂亂整日繼之以夜直至今晨二便並行乃止止則其脈也宛如平人未刻而大汗遍體濕透重衾遂為兩目迷睡隱隱嘆息循衣摸床手指蠕動面色如紙脈細若無舌苔光澤不紅言語聲氣不續此名脫本無治法勉因脈未躁疾汗未全冷陽氣雖欲離陰而飛越於外陰精尚有涵養而交紐於內然素傷之陰能有幾何如不汲汲斂攝補益終歸於脫勉擬一方亦屬背誠矣人參坎氣白芍牡蠣五味子牛膝菟絲子五診昨日陽欲離陰脫象已備而用獨參扶正坎氣鈕鏈牡蠣澀以固之五味酸以收之牛膝引陽入陰白芍從陰引陽菟絲凝結正氣居然汗止陽回氣歸神宅如此轉機藥功厥偉如當此之際委之天命其悔何窮由此觀之病之挽回雖系造化亦由人力耳刻下大寇蕩靖城倉敝敗善後之事宜作如是論人參茯苓神金石斛橘白竹二青川貝母枇杷葉秫米中案大凡時症不外六淫六淫者風寒暑濕燥火是也燥火與風陽多陰少隨感隨發寒與暑濕陽少陰多能伏能蘊所以傷寒與疸瘧都有內伏而發者秋季之病由於暑伏暑必夾濕濕能傷氣暑亦傷寒是病不寒獨熱今恰半月刻見神識昏迷譫語無音面色青晦目有白翳六脈濡數而浮舌苔灰黃似腐熱不外揚渴不多飲此由中陽式微砥柱無權暑濕不能達外反致內陷古云陷者舉之東垣所謂補中益氣是也扶正達邪本屬善治無如邪固可達痰濕難化嘗考薛葉諸賢每以辛香能逐由此而論扶正為督戰之師達邪作剿賊之將然危篤若此百中圖一而已擬方即請有道商進上明雄精二分九制膽星二分當門麝二釐豬牙皂二分四味同研末用人參鬚五分河水煎濃湯調服案症恰半月已屬三候期日際此中秋節令向愈之期似不為遲然不但暑濕未化抑且積亦未清暑濕積三者已屬鼎足之勢安可增一熱字所以熱戀不退稍動輒汗汗不通體睡中較多咳嗽痰黏煩懊夜甚從脘至腹偏右一帶按之板硬問之略痛脈形濡滑渾數重按無力舌色淡黃干垢尖紅心露想其暑乃夏令之邪天之暑熱一動地之濕氣自騰人處其間無不感受暑濕兩字每多連呼暑由三伏而受故謂之伏夏邪秋髮亦謂之伏伏之一字邪根深蘊可知現已化熱熱之性固速而與暑濕為伍亦不易化且易傷液症之口渴煩躁面赤舌紅皆從此出胸前刻雖紅疹密布而隱約未透固是暑濕熱之出路然不足以挫其病勢昔諺云透疹之際不可下奪非確論也蓋疹㾦之來必從暑濕積熱鬱蒸而出若得四者可以分化何傷其疹與㾦哉論變非昏即厥須預防之擬方請政鎊犀尖白桔梗丹皮連翹蟬衣竹茹鮮薄荷全瓜蔞粉葛根黑梔鬱金枳實茅根另上犀黃石菖蒲風化硝同研末先服案症恰三候始起寒熱似瘧得汗不解繼則熱戀不退入夜為甚咳嗽痰黏煩悶不舒脈來郁澀而數左部帶弦舌底光紅干碎苔如糜腐此由濁邪交蒸化熱兼之情懷悒鬱木不條達亦易化火充斥肺胃蒸濁成痰上熾於華池消灼於陰液也當此時邪為病自然持之於藥草木之功原可克奏若論拂鬱情傷須期怡情暢懷兩者並行方合病機擬方商進玄參薄荷淡芩生石膏生梔知母連翹益元散鮮生地淡豆豉同打牛蒡竹茹蘆根摩鬱金摩犀尖二味沖案症經四日當時大寒大熱自午後而起徑至黎明得汗而解以後至時復作卻不甚重汗亦不多此非邪達勢輕乃邪伏募原氣為邪遏不得外越所以昨日午後來勢又甚甚則煩悶胸躁渴難多飲脈來弦滑而數舌苔厚黃而膩乃暑濕內蘊為新寒新積觸發積乃飲食所成而必在胃胃屬陽明乃多氣多血之鄉胃既為病氣血不得流暢邪必因之而入是以日輕日重是起伏惟恐淹纏生變香薷葛根半夏制茅朮制廣軍白蔻仁川朴柴胡藿梗焦枳實冬桑葉闢瘟丹一兩案年紀甫冠智慧過人以致情竇早開腎關不固可知矣邇來不寒但熱今交三日熱勢起伏伏則猶可起則煩懊胸悶睡中背部出汗湧吐涎沫當臍跳躍偏右按痛脈來弦滑而數舌苔淡黃而膩此由夏令之暑邪內伏募原新傷之寒滯盤踞陽明若論動氣非大虛即大實病甫起而見此所謂未病先虛當臍乃少陰地位顯系元海不藏封固失司體虛症實不但用藥殊難更卜易生變幻商進南沙參蘇葉全瓜蔞乾薑連皮檳桑葉粉前胡陳皮法半夏枳實上川朴豆蔻摩烏藥四分摩石募三分二味沖案夏受暑邪秋必成瘧瘧類有四治宜分晰此症始而先為寒熱繼則但熱不寒腹硬按痛的是暑邪從募原走少陽而傳入陽明與積合病竟成疸瘧也列於諸瘧門中似敘似釋亦未立方後出喻嘉言立甘寒一法即熱之謂濕乃黏之濁每以清泄取效是病熱積未聚攻消不合過清非宜轉輾思之擬芩葛並瀉心法其間復入宣竅蕩滯之品未識符否請主翁斧政鎊犀尖葛根淡芩川雅連石菖蒲白茅根豆豉枳實鮮荷葉白桔梗連翹竹黃木香導滯丸案初診症經四月有餘始起寒不能栗熱不退清刻下寒熱雖退變為腹脹得食脘痛手按輒拒舌苔滿布濁膩脈象右手沉實小溲不多大便艱行經云先夏至者病溫後夏至者病暑病肇祭屈之令競渡之際其為暑濕無疑病於少明之間名曰似瘧其時若能藥當病情風食禁忌何致迄今不愈反加成臌之險邪濕既不能達自然壅積為內傷脾土中焦運化之機乃息為腫為脹諸症紛起經所謂濁氣在上則生䐜脹太陰氣至亦䐜脹也為今之計不得不用疏逐一法古人有言兩虛一實當開實面且是症元傷成損當可緩調喘急驟加危期至速姑擬先賢劉河間神佑舟車為主五皮泄水佐之以望有形濁滯隨便而去無形清氣由此而升方可轉機然背水之戰即此一舉矣未識然否即質高明金沸草冬瓜皮前胡澤瀉葉青陳皮蔞皮連皮檳赤豬苓上川朴焦枳實舟車丸方通二診儒經云氣之輕清而上浮者為天氣之重濁而下凝者為地人身之中以肺為天脾胃為地蓋肺位本高其氣清輕卦中配為乾天脾胃居於中下其氣重濁卦中配為坤地肺降脾升以成天地交泰而生萬物何病之有今因瘧後濁邪渾合清氣不升濁氣不降而為否卦否者脾也絡氣不和隧道壅塞為腫為脹為痞為滿無一不為竟成束手重症幸得大方疊進化險為夷否轉為泰濁邪化其六七病情退下三舍然還須慎寒暖節飲食方不再蹈前轍再擬一方以冀餘氣肅清為妥金沸草前胡上川朴冬瓜皮製半夏桑根皮老桂木香附茯苓皮連皮檳草果仁炒薑皮案天氣清明地氣安靖氣來如正則人民少病今歲甫交夏至天氣暴熱吳氏謂之未至而至氣來不正即謂之邪人處其間壯者自可運行怯者著而內蘊至秋而發皆曰伏邪觀其時之早晚邪之多寡而伏必在募原其發或入少陽或歸陽明入於少陽則輕可成瘧疾歸入陽明則重此症皆因胃腑傷積所以甫發即陽明與積合病病已十有三日入暮四肢漸寒繼則甚熱煩懊頭暈腹時呼痛從脘而至少腹俱為滿硬大便雖行盡是稀水脈來滑數而弦舌苔黃而膩熱至寅卯之間無汗而和夫寅卯從陰轉陽身中之氣循行注肺所以無論傷寒疸瘧此時必和蓋邪猶如陰柔小人一切轉陽則伏設使有汗當言其伏況無汗乎一切款端刻皆隱匿於後恐其接踵而至便成棘手重候際此大戰之秋安可不出大隊臨陳否則悔之晚矣黑山梔豆豉桔梗連翹川鬱金方通草橘紅蟬衣花檳木香枳實鮮薄荷鮮竹茹另石葛根二分生黑醜三分煨木香三分巴豆殼四釐上川朴三分五味為末先服案古云體肥多濕暑必挾濕體肥則中氣必弱暑濕亦傷氣分夫氣主於肺邪從口鼻而入內伏而發名曰伏邪六淫之邪惟暑濕易伏伏於臟為瘧瘧之間作日作即邪之可淺可深耳伏於胃亦為瘧瘧之不寒起伏乃兩陽合明故也是症今交十有三日始今的是陽明瘧症所云暑濕皆病於氣肺胃見象無一不具鼻竅黴黑鼻尖不溫熱勢起伏胸痞煩悶皆其徵也蓋暑為天之陽邪濕屬地之陰邪暑欲化火化燥而不果者濕遏故也濕濁瀰漫而內蒙者暑之蒸也舌苔灰黴底質乾燥渴飲脘痞右脈濡小皆其徵也暑濕相互必當開氣氣開則暑濕不合清氣自升津液乃復法當開展上焦宣化中焦淡利下焦俾得肺氣清曠化源自流則暑濕之邪自然分泄矣由此而論治上為主取微苦微辛條參入芳香甘寒一二以望應手不爾恐暑濕交蒸熱穢之氣內衝心包必至神識昏糊四末清厥等險拙見如是即請有道商進香豆豉大腹皮川萆蘚苦桔梗蠶沙光苦杏廣鬱金生苡仁乾白荷花瓣辰滑石摩犀尖半分摩花檳三分二味和沖服案初診天之熱邪為暑地之陰邪為濕暑濕蒸騰人受之以口鼻發於少陽則為正瘧發於陽明則為起伏起伏之因根於募原正瘧由乎半表半裡也所以熱至亦覺先寒惟是寒不能栗熱不退清謂之陽明之起伏瘧蓋胃與脾相為表裡胃病則脾亦病病甚強食不化而為積與濕雜蘊於回腸而成下痢夫痢症古稱滯下又謂其病先痢而後瘧者其病輕而為順先瘧而後痢者其病重而為逆何況多病久煙之軀瘧勢未衰痢又復甚乎即此兩端已屬險危猶堪灰黃之苔邊有白腐熱甚之時中兼神迷乎歷考古方先瘧後痢名曰經邪入腑羅氏有敗毒一法虛則加以人參實則增以大黃其法最美喻氏稱謂逆流挽舟提邪出腑概可想見今症邪積未去人參難加素體不足大黃可去治宗敗毒之意以冀弋獲之幸未識然否羌獨活木香炭柴胡枳殼炒撫芎紅神麯前胡赤苓苦桔梗福澤瀉薄荷滑石辰拌戊己丸香粳稻葉同荷葉包刺孔二診凡人有經有腑腑乃藏積之處經有留邪之地夫邪有感有伏伏則自內而發感則從外而入瘧痢之為病暑濕之根源暑濕為夏令之邪瘧痢是秋時之病其為內伏而發如操券矣所以始起為瘧繼則變痢經邪因府之積而益熾痢症由乎瘧病而為逆痢必有積瘧必有痰至於裡急後重腹痛窘迫勢所必然舌苔灰黃痰黏神昏理之固耳前投敗毒一法寒熱較減痢勢亦稀未始不美第久煙多病之體厄忒苔腐之忌一線轉機焉能足恃再擬一方希圖旋吉葛根炭二錢淡酒芩一錢五穀蟲炙二錢福澤瀉二錢苦桔梗八分赤芍炭錢半柴胡四分前胡二錢香連丸七分紅神麯各三錢槐米炭二錢枇杷葉一片檀香三枚三診凡人生長皆在脾胃所以五行配土八卦為坤胃司納而下降脾司健運而上升水穀入胃精液生脾灑陳於六腑而氣至和調於五臟而血生氣血由此而生百病從何而至古之聖賢無不歸重於脾胃正所謂土生萬物是也刻診自瘧變痢體本煙虛初進逆挽之法繼投葛芩之劑寒熱神昏固退下痢度數亦稀未始不為美事惟宿垢雖下納仍不加紅膩雖少急重不除四肢有牽振之意遍體出溱溱之汗時見厄忒苔現灰浮左脈弦數右手更甚暑濕積滯雖有分化之機中土氣陰已具敗變之象叔和云胃見肝脈木假土也醫書云痢宜小脈與症符也蓋痢雖濕積所成能成則愈今則所納之物止能米飲稍多即覺停滯中脘必借煙力撫磨而後方可其胃之敗其脾之戕朗若列眉其病之凶其款之忌明如繪素也自昔聖賢以藥治病無非補偏救弊而已至於收功無一不以脾胃為主前之李氏後之葉氏皆詳論也為今之計宜先扶土以振後天疏補以冀運納然襪線鉛刀不足以濟事矣南沙參於術懷山藥扁豆石蓮子秦皮炭茯苓赤白芍地榆香粳米另五穀蟲一錢當歸一錢炮薑炭七分上於術六分黃柏五分煨木香七分研末米飲為丸四診苔浮乃腐之根不食乃厄之源痢之敗症必有之事何也蓋陰傷則陽亢為腐中虛則氣弱為厄所以謂之敗症也症既敗矣藥何能調但既操司愈之權雖屬臨淵結網不及之事不得不縈思披素上挽天機下盡我心是固有數存焉者矣大西洋參野於術生白芍山藥鐵皮石斛炒赤芍毛燕窩扁豆陳阿膠香粳米豬苓五診古云泄久傷脾痢久傷陰昨用仲聖豬苓法益陰化濕參以東垣之方補脾醒胃服後竟得便行成糞之垢半碗之多腐苔化去絳底黑麵此等轉機確非淺鮮無如陰液不能一時而復元氣難以頃刻即回自覺煩躁日常睡露脈象仍見弦數口渴時喜飲湯以此而論尚在險津歷考聖賢痢久元傷之門有用益陰有用補氣雖能轉險為夷然中土弊敗藥力難施姑再出入前意而治第恐杯水不足以救輿薪蝦力何能主任行舟也再疏一方仍冀亦兼之吉西洋參半生半熟生熟龜板杭白芍於術石榴子生山藥金石斛陳阿膠宣木瓜茯苓神黑豆豉六診痢多傷陰心陰傷則夜不寐肝陰傷則肢震動胃陰傷則煩而燥脾陰傷則舌根強種種見端皆其徵也今雖納食轉醒焉能供其悉欲取資於胃液乎前進益陰養營有裨於下未礙於中所論諸陰皆傷東垣易老本有胃陰傷則不食之訓養陰之藥甘寒為主鹹寒佐之酸寒之品亦可濟陰不爾其病雖退其元不復如能氣陰恢復飲食漸加方可一日霍然而愈不然近則恐厥脫遠則惟慮損怯沙參三錢鮮斛五錢生龜板七錢牡蠣五錢野於術錢半白芍三錢豆衣三錢淮山藥阿膠錢半五味子五分訶子錢半棗仁三錢濂珠二分真玳瑁三分同研末服七診二十餘次之痢數轉為干溏兩次誠為快事然脾土既不能運必無痢數遞減之理胃土既虛於陰自然清養漸進穀食湯飲雖少形神日乏痰吐頗多納穀難化胃陰之虧脾氣之虛猶可據矣但一波未平一波復起病者豈可主任治者不遑應接古人云有胃則生無胃則敗良非謬言歷考東垣潔古之訓萬病皆以胃藥收功蓋醒胃之藥非溫即燥施於痢久傷陰舌紅刺滿之症可乎否乎從陰陽而減前法勢難迅棄姑選陰不味厚陽不溫燥以冀有彼此得益是耶非耶是症波折既甚用藥可謂掣肘擬方冀能應手未識有從人願否北沙參五錢金石斛三錢竹茹錢半上於術二錢製半夏三錢枇杷葉十片川貝母三錢新會白一錢雲苓四錢海蛤殼一兩資生丸三錢案向有停飲外感風邪表氣束縛不從汗泄風氣通肝邪郁絡阻左脅作痛邪郁生熱與有形之痰積交蒸神明為之擾亂大便不解頭脹身熱無汗言語有時錯亂氣逆噯氣舌苔中心干糙此風溫夾積夾痰不達不化將顯傷陰劫液之象脈細數少力是本質素虧無糧之師利在速戰管窺之見請主翁裁奪牛蒡子桔梗廣鬱金桑葉杜竹茹川貝母橘紅摩枳實前胡竹瀝達痰丸三錢案大概六淫之邪上受者不離手太陰肺經下受者不外足太陽膀胱經內經云清邪中上濁邪中下風燥為陽化之邪自傷肺經肺主一身之氣又司五音在時為秋在色為白在變動為咳在津液為涕刻症肺病畢具所重者鼻竅扇動但坐難臥熱勢重而脈象過數咳嗽甚而舌苔黃濁不離風燥為主抑且痰積相互而閉里痹表鬱則動風生驚氣升喘促諺所謂夾驚肺脹者是也擬方備商淡射干前胡光杏象貝冬桑葉豆豉牛蒡橘紅另摩鬱金摩枳殼用鮮荷葉五錢萊蔔半個雅梨半隻打汁調二摩末藥服案痢曰滯下滯乃不通之謂由於濕熱食積阻於回腸屈曲之間傷氣則色白傷血則多赤傷於五臟各隨其臟色而異治法暴則為實宜通久則為虛宜澀此病已愈兩旬始起寒熱似瘧繼則變為腹痛下痢舌色灰黃而干脈形濡數而實所痢之物紅勝於白竟有形塊稍見穢膩仍無宿垢形神日削納只粥飲濕熱積滯互阻不通脾土無消運之權腸金乏傳導之官古云兩虛一實尚開一面標本同病急在先治明指實急於虛通先於補之義脈舌症象匯而合參不得不假法於一下如能濕滯分消方可痢止痛停二便如常納食復舊矣倘言因其元虛而因循望愈則厄逆起腐延恐不免拙見如此即請明商煨葛根建澤瀉淡芩撫芎赤芍楂肉炭紅神麯煨木香青皮雅連木香檳榔丸案內經論血陽絡傷則血外溢又曰陰氣者靜則充長動則消亡所動之由氣也火也所以古人治法不清其火必降其氣徐之才繆宜亭所謂氣為血之舟楫火能載血上浮是耳刻下吐血雖止脈尚帶數陰絡固靜氣火未熄今宜安養以待其復倘仍經營操持必致由傷而損自損成癆之險西洋參五錢炙紫菀一兩五錢石斛二兩冬瓜子二兩茜草二兩大生地三兩大白芍二兩黛蛤散三兩黑山梔二兩西瓜子二兩蓮鬚一兩五錢陳阿膠二兩黑豆衣二兩粉丹皮一兩五錢鬱金一兩淡黃芩一兩龜膠二兩鮮藕汁兩碗真秋石三錢用水煎之次將兩膠化入下秋石藕汁收膏案夫痧必在於肺者皆由痧從風溫而成蓋風為有形之陽邪溫是化熱之氣無形無質其從口鼻而入肺居上焦首先犯之肺為嬌臟又曰華蓋而司一身之氣氣宜下降肺既受病則氣道憤郁濁聚成痰逆而不降以致喉間痰聲漉漉氣粗宛如拽鋸脈來滑數舌苔黃膩而厚已成肺脹重症病之重險可知當用疏胃府而化其濁宣肺氣以徹其邪使其邪達濁化其氣自降如不應手則變幻倏忽矣麻黃橘紅金沸草半夏廣鬱金生石膏桑葉包煨牛蒡前胡光杏仁枳實炙白前控涎丹案大凡病中不能食者脾胃必虛經云清氣在下則飧泄中氣不足溲便為變皆指脾胃而言便泄氣滯溲清舌淡面色無華脈形小而無力何一非中焦為賊蹂躪倉廩久乏積貯之故蓋五穀入胃磨運在脾清者為營濁者為衛灑陳於五臟和調乎六腑諸經與絡得以滲灌內外表里皆能充實所以體之壯者其食倍加面有露桃之色指有扛鼎之力體之怯者其食減常面具露氣之痰手乏縛雞之能至於脾胃之論最重東垣大旨脾宜升則健胃宜降則和和者取其甘溫升者必用溫熱姑以耆附六君加減俾得脾胃並復穀食有增則病愈速矣綿耆三錢東洋參三錢茯苓三錢於白朮二錢炙升麻五分炙草三分淡熟附五分木香七分菟絲餅三錢案濕為六淫之一其傷人也有表有里里生於水穀表由乎雨露雨露從天而降由皮毛而走經絡水穀自內達外由臟腑而走經絡古人以肺與膀胱為濕之表病脾與胃腑為濕之裡病主治之法有散有運並宜分利大概如是是病也遍體作痛手足麻木舌苔黃膩寒熱不甚乃表裡同病皆由勞倦則脾肺之氣皆傷傷則衛外不固表濕襲而蘊於經絡運化不司則里濕聚而營漸失和濕性瀰漫最怕神識昏糊之險姑仿羌活勝濕湯加減羌獨活桑葉枝秦艽桂枝蠶沙建曲川萆薢赤豬苓川朴防風蔻仁陳皮案運籌握算本傷心脾脾傷則易生濕痰心傷則不充神血是以未病之前常有嗽痰少寐今暑熱伏邪已經匝月有餘其中輕重變遷不煩多贅且就刻下而論熱不外揚神識糊塗厄逆頻頻不嗜湯飲舌苔漸黃而黴脈象濡數時見噯氣大便溏薄此乃平素痰濁與積為伍伏暑之邪本喜入心心經神血一虛則內走尤易脾臟濁痰不化則窒塞益甚頃見吐痰兩甌厄忒神識頓覺稍慧其為上中清曠之地悉被痰濕矇昧可知蓋時症患於元虛之體已屬不支易變矧加厄忒糊塗之忌險重何待余言姑擬開泄滌化宣竅安護一法竊恐投鞭不足以斷流耳金沸草香附丹參法半夏枇杷葉茯苓神天竺黃紫菀橘紅廣鬱金薑竹茹另陳膽星三分刀豆子四分九節菖三分上沉香三分同研細末加竹油一小碗薑汁一小匙案今秋天過亢晴晴則燥燥乃溫類所盛之邪是以一熱則甚甚致言語糊塗今得大汗遍體熱勢已解大半似有告痊之機然左脅以及胸膺呼吸皆痛舌苔淡黃而厚脈象糊悶而數此由邪熱因汗而稍達氣閃於絡而不和經云肝生於左肺生於右又云肝臟血轉司經絡昔賢治法溫邪當分感與伏閃氣宜辨肝與肺今病溫邪在肺宜用辛涼閃氣在肝宜和血絡姑擬一方以望應手庶免昏喘痰紅之險牛蒡子前胡豆豉紫蔻仁枳實達痰丸竹茹橘紅絡桑葉光杏金沸草上鬱金細香附同研末服案夏令暑濕至秋而發名曰伏氣夾積則病甚於里腑受則泄矣感風則病甚於表經受則熱矣是症始起不覺寒熱即為便泄其夾積也昭如繪素雖經調理而愈未久即患寒熱似瘧非瘧膽胃同病據述中途寒熱雖止不免口腹未謹皮毛未固既感時令風溫復傷新食之積是以病來兩候已見神識昏糊不言不語熱勢內熾舌質灰黃口渴飲少汗疹全無數日之前大便夾雜紅穢今按其腹板硬兩手推拒眵障其目目亦不開焦燥其唇唇乾裂血咳嗽不揚而聲被痰黏痛癢不知而煩懊如故呼吸氣粗面色晦滯脈象右寸弦澀右關數實右尺重按似有搏指之意左寸濡數左關見弦左尺嫌太露有不藏之象此由風溫蘊於肺胃逆傳宮城之內痰積熏於臟腑之間蒙迷清曠之地蓋風溫本屬陽邪變燥化火素為易事痰積自有穢熱之氣熏竅蒸絡尤屬不免大抵心主一臟義不受邪人之聰明智慧皆繫於此既被邪陷入自然險象疊出忌款畢集聊作背城之計竊恐畫餅於紙徒增想象之嘆得邀蒼天默佑或可轉機一線否參鬚鬱金射干鮮薄荷生廣軍川象貝光杏桔梗連翹遠志炭天竺黃另豬牙皂三分九節菖三分陳膽星三分明雄精半分同研末用雅梨一隻薄荷頭兩朵打汁調服改方去雄精加安宮牛黃丸半粒大黃換摩案夾食似瘧發於小雪之後已屬遲而且晚濁邪之甚病根之深何待言哉復以因積而起三者置成犄角之勢無怪其病及四旬不但濁邪未化抑且積亦不清如不見虛象從似瘧例治當不致於鞭長莫及而體質已傷竟是輕舟重載變幻莫測矣半夏藿梗茯苓神廣生軍淡芩草果仁丹參雅連枳殼實連皮檳桑葉摩烏藥石菖根沖案初診夏令暑濕至冬而發始起為瘧繼合成痢腹痛攻撑裡急後重舌淡黃而厚濁脈弦而右實納少噦惡寒熱依然伏暑必挾濕濁是以日久不愈復加鬱怒異常食物不謹經病未已腑病接踵諺云瘧變為痢最屬大忌竊恐轉輾不愈有猝變之險上川朴赤芍蔻砂仁藿梗通草紫蘇梗連皮檳川芍沉香曲紅曲桑葉青陳皮赤豬苓香砂枳實丸木香導滯丸改方去導滯丸加荷葉半張二診大抵下痢之病當分虛實實乃腑積欲下虛則臟液被劫前用痛欲其通之法今得黑垢一次腹痛隨之較減其為積也何疑夫痢症根於暑令濕熱夾積交秋不發及冬而病其病深也可知矧而先患瘧疾既而變痢方書謂之經邪入腑忌逆之象世有先瘧後痢為不治之諺危也險也何煩余言再擬一方以圖弋獲備商紅建曲煨葛根黃芩炭桑葉上川朴連翹五穀蟲炒豆豉枳殼實雞金炒澤瀉砂仁另摩青皮五分檳榔六分香連丸八分山楂炭一錢同研末服或和入藥內三診數十次之下痢今減至六七之度兩月以外之似瘧刻已熱勢退清兩方之效可謂美矣夫服藥則下黑糞不藥則仍紅痢其故在何痢症必夾濕熱傷氣則色白傷營則色赤水穀雖入於胃摩運則在於脾泌別必由於腸從此而論足太陰未克輸化之故手陽明難司傳導之職向推病情專事中下為要領和氣化濕為佐如得應手方收全功豆豉淡芩炭青皮五穀蟲廣木香駐車丸楂炭赤白芍澤瀉雞內金臟連丸沉香穀芽案西方生燥燥必爍金金屬庚辛在人為肺即燥之一字已足令人為病況值冬令氣暖風夾溫氣名曰風溫風溫乃無形之邪首必襲肺肺主皮毛而司咽喉肺為風爍肺氣不能下降胃濁凝聚成痰冬至一陽未復燥氣乘機而發是以先為咳嗽繼則身熱音啞氣逆胸脅作痛喉間痰聲霍霍咽房腫漫如梗會厭之內白腐滿布連日嘔痰數盂症勢較前舒松然未得暢汗大便堅結肺胃之風溫痰濁尚未得以外達風溫為天之陽邪其性迅速恐其偏退易復須得內外分泄方為妥貼麻黃薄荷象川貝杏仁馬勃淨蟬衣苦甘草牛蒡玄參桔梗前胡生梔生石膏另摩犀尖鬱金和入風化硝調服大便雖行尚未自然六脈雖一尚嫌弦大得食則腹有脹陳得飲則痰出較易交寅則虛火上炎至晨則咳甚汗泄其為陰分日虛陽不潛藏可知蓋人猶天也天以春夏為生髮人逾四十臟氣漸衰今則年已五旬外時屆秋冬欲望生生不亦難矣前投潛陽之品胃納不減古人立方無非補偏救弊陰欲其平陽欲其祕則壽陰竭於下陽炎於上則病法當加重前方以冀陰充陽潛納食漸加或可返秋冬而變春夏則陽和之氣充滿乾坤炙龜板川百合棗仁炭金斛女貞子人參鬚大麥冬北沙參淮麥海浮石川貝母案夫厥者盡也凡物陰盡而陽生陽盡則陰復人之厥陰寓肝肝為木木能生火火為陽陽宗於陰所以古人有相火藏肝之訓也肝性條達而捨生風一有悒鬱母子則經育兩難肝病及脾則為腹痛為攻撑忽寒忽熱為不寐為心悸常噦常吐經云肝膽乃生髮之機脾胃謂之營衛之源肝氣橫久化火胃陰日見消耗所病神乏形疲納減不寐甚至血從上溢難過莫名無一非生髮之氣衰敗營衛之源枯稿治肝之法內經有辛以補之酸以益之甘以緩之名曰治體治用治本苟能肝臟一治則脾胃自復所患之病可愈矣即擬膏方一則能代湯藥之繁一則可收緩圖之效所有謬疵即請有道政之生熟地西黨參茯苓神蘇羅子杭白芍當歸身紫石英冬於術新會皮女貞子酸棗仁炙甘草厚杜仲龍眼肉延胡索陳香櫞奎杞子柏子仁細香附陳阿膠白蜜收膏案初診下江之地濕邪恆多況久居滬上地濕尤盛濕為土氣不在胃而在脾胃居中脘脾主肌肉苟其脾胃之氣充足運化有權安有濁留中脘濕阻脾絡之患此症始起似屬勞倦無力繼則不寒身熱已而兩足酸重步履維艱邇來手亦如是上舉無力轉側不能脈來濡滑而數舌色厚白而膩咳嗽痰沫小溲渾濁良由冬令氣暖寒風外襲肺經內應肺屬乾金以配為天脾胃屬土以配為地地濕已甚天氣復痹競為陰霾四合清曠失司燥烈之地變為沃壤之土幸而風寒不多尚可不成痛痹且開天氣逐地濕冀其內外分化擬方候商麻黃半夏川芎橘絡皮茅朮活絡丹桂枝前胡蔥白桑葉枝川朴枳殼實二診內經曰人有五臟外配五合皮毛是肺之合肌肉是脾之合血脈是心之合筋絡是肝之合骨髓是腎之合營行脈內衛行脈外晝行二十五度夜行二十五度左升右降回流不息猶日月轉旋耳今因濕濁內阻營衛失於流利經絡被其窒痹牽掣轉側維難咳不揚而痰黏脘常痞而不暢小溲雖渾大便未行脈象似大於前舌苔已化其半時覺煩懊得汗不暢前服五積散合活絡丹一法絡隧稍通蘊濕略化無如中脘既為濁滯所踞不能下降自然上泛胃為陽土以通為主脾為陰土以運為用若得脾胃通運之有權何患濕濁之不化再擬一方以冀漸入佳境熟附北細辛桂枝尖川芎羌獨活青蔥管桑枝橘紅枳殼實絡石藤寄生金狗脊溫化丸案泄則傷脾久則必傷於腎所以古人立胃關煎脾腎雙補之法脾為後天之本腎為先天之源脾傷則運化乏力胃納應減胃為陽土而主容納脾為陰土專司磨運一納一運互相資生至於腎經一臟內藏命火火如充足方能腐熟水穀生化氣血而今時寒烘熱已退固是暑濕化解之徵無奈泄之不休今及兩月飲食日減心蕩顴赤脈來細弦右尺按之虛散舌質淡紅滿布點點白疳即此見端已有藥不勝病之慮況十日後陡增咳嗽氣促不但用藥有顧此失彼之虞抑且肺經因咳再傷土本生金金為水母循環傷虛滋漫難圖擬引火歸源猶如釜底增薪如能土健火旺泄少谷增冬行春令或有望焉玄武版五錢淡附子三分煎湯炙白芍一錢訶子錢半血鹿片三錢先煎菟絲子三錢茯苓神各三錢淮藥四錢生炒於術二錢五味四錢炒黃川貝東西洋參各一錢秫米三錢白蘞一錢蛤蚧尾一對四神丸案諸恙經治漸平元氣未能迅復婦人不孕因有數端考之方書不外稟賦薄弱肝脾氣鬱子宮寒涼衝任同病欲得天上玉麟而借草木之功者無非補氣血疏肝脾暖子宮兼調衝任自宜靜養遠怒親觀或可一索而得大熟地六兩青陳皮各一兩茺蔚子三兩茯苓神各三兩當歸身三兩大川芎一兩山萸肉三兩淮山藥二兩杭白朮三兩制香附三兩大有耆二兩潼白蒺各二兩滁菊花二兩奎杞子炙二兩西黨參二兩二泉膠二兩臺烏藥二兩陳艾絨八錢上藥同研細末水泛為丸緑豆大每日清晨入暮各服二三錢開水送下案風溫症一候之外曾見熱蒙痰痹神識昏亂氣喘厄咳甚至撮空罵詈二便不知治者不止一人病家亦知難救有用葶藶瀉肺湯有用蘇子降氣湯皆佐摩鬱金刀豆子一類案頭諸方談論不一余亦謝其不效細思風溫發於冬令必非伏邪自然先傷於肺繼入於胃逆傳必至膻中正與葉氏法合蓋葶藶瀉肺中之有水氣咳喘蘇子治上實下虛之氣喘雖未盡進進亦無益勉擬東垣清心涼膈散參入鮮薄荷雪梨汁鮮枇杷葉白茅根送入萬氏清心丸一劑知二劑減後因熱痰尚踞神識難清而用導赤散加入膽星竹黃菖蒲等品諸象皆退惟如舌根灰黃小溲痛閉榮云上中痰熱盡移於下心肺久受病困則膀胱無輸化之權小腸為熱邪之結八正三石不應必是下焦陰虛濕熱閉結乃用通關滋腎丸非惟小溲大暢抑且旬余之宿垢亦從後陰而出矣凡病自凶變吉豈可不運神思不任干係當時余雖辭謝因思人命至重又兼病家勿怪乃有此舉方附案內案初診經停三月按徐之才逐月司胎本在足厥陰經厥陰屬肝肝為木木能生火火沖胃濁例有嘔吐惡食喜酸等象辛溫雜投甚至上下血溢血為陰陰虛則陽更旺幸有平木養陰之劑絡和血止但嘔吐仍然滴水不納膠痰頻出通宵不寐五心煩躁近日尚用冷水口含勿含則嘔惡連作竟有風動頸搖四肢震掉足冷額汗氣從下升明是痙厥脫離之險蓋人陰陽有偏必有旺嘔吐一症本有寒而有熱景嶽之神香散為寒而設也內經之諸嘔吐酸屬熱之文也自入薑藿反加血溢其為熱嘔明矣然刻下胃氣逆亂陰液大傷純苦又恐格拒姑仿經旨甘以緩急涼以泄熱先示其喜而後復用苦以降之寒以清之未識得線效否鮮生地雪梨鮮石斛蘆根同打汁溫熱先服一半後送三補丸一錢二診此病一劑減半二劑已止而後擴充前方乃愈三補丸取其黃柏堅下則於火不協為患黃連清肝黃芩泄膽後進者胃虛惡苦是也不清其下雖甘寒治胃亦屬徒然四汁法取鮮地鮮斛養陰蘆根雪梨滋液先服者胃虛喜甘然後胃氣乃降方可受其苦寒以至下焦也用汁取其力全用丸取其過胃方化耳案經云形寒飲冷則傷肺有外感內侵之義也蓋衣寒風寒從外而入飲寒食寒從內而侵肺司皮毛肺主上焦外感無有不自皮毛而侵豈能不由上焦所以肺經之病較倍於他臟肺病氣上逆多致咳嗽是症肇起多服苦寒解毒嗣又寒冷不慎咳嗽之患已延數載遇冬則甚交夏稍平肺為天天氣不用則土氣常濕脾為地地氣不燥則金氣益疲津液既難於上輸水濁不易於下化究竟肺病為本脾病為標是咳甚於嗽痰少於聲耳今雖苗秀之紀陽旺之時尚難杜除始至二八之歲陰通之日止能帶病為纍矣姑宗經旨肺欲散急食辛以散之肺苦氣上逆急食苦以降之溫以化之之例商進東洋參一兩苦杏仁一兩蘇子一兩製半夏一兩半廣鬱金一兩雲茯苓一兩五錢桂枝尖二錢前胡黃白朮一兩上耆皮一兩五錢北細辛錢半薄橘紅五錢上藥共研細末用枇杷葉卅片白果肉卅粒煎湯泛丸每服三四錢開水送下案大凡損症惟肺最易者何也蓋肺病必咳咳則氣易泄火易動氣泄則不固火動則陰傷然後高源漸竭龍相均熾水火日偏陰陽失濟所以古人有損則不復謂之癆症必上為痰紅下為走泄咳嗽不已食減肌灼傳至便泄而後已即越人所謂上下交損中土已敗也客秋諸象俱見後又值經營煩冗天地之陽未復人身之陽多動皮毛開張風邪侵隙先覺頭脹咳嗽繼則吐紅夢遺兩進參蘇飲外邪已盡今擬膏方並補三陰俾得太陰有相生之權少陰無觸陰之弊則土能生金水能涵木厥陰一經亦得平補矣大生熟地各一兩西歸頭二兩奎杞二兩西洋參二兩黨參三兩肥知母二兩茯苓神各三兩天麥冬連須二兩女貞子二兩制香附粉丹皮二兩黑豆衣三兩白芍三兩炙紫菀一兩五錢蛤黛散三兩川百合二兩石決明煨四兩阿膠二兩煅龍骨牡蠣各三兩雪梨膏二兩川斛二兩白蒺藜三兩桑葉二兩龜膠二兩案閨秀十四通經本屬順正因肝氣常郁肺氣不宣藏統失職衝任貯少以致一潮即止脈來細數大腹旋滿忌款見矣藥恐難圖全當歸撫芎香附延胡月季花沉香化氣丸五靈脂花檳砂仁烏藥茺蔚子四制香附丸案右脈稍揚左關尚弦肺氣少宣肝陽未平肺屬金肝屬木木無所畏則風陽上騰金不能制則子氣亦衰病非六淫效焉能速歸身炭黑衣豆秦艽橘白葉炒白蒺藜穀芽功勞葉川斷肉香附金狗脊桑椹枝案痛無定處氣病為多蓋脘為胃部腹為肝地胃喜降肝喜疏疏降既應痛自輕緩再從土木同治川楝子赤白芍烏藥青皮橘葉白木香陳香櫞大腹皮枳殼穀芽砂仁殼下案大便數行宿垢溏糞俱見未始不美詎知竟有赤膩之物殷紫之塊想是營血為熱迫而出至於甫醒即睡睡中囈語舌根之灰黃較昨日又多固是濁邪之外越然濁為熱蒸即是痰火機竅如不被矇蔽應號轉即睡不致言語如夢也總而論之當在險嶺矣再擬一方若得諸款畢謝庶可把握備商陳阿膠錢半黃柏末同炒石決明六錢茯苓神各三錢鮮石斛四錢益元散四錢竹黃二錢炙龜板三錢杭白芍錢半花檳榔五錢北沙參三錢竹茹十張一錢五另上西黃二釐陳膽星二分金箔一張川貝二分同研末先服案拱頭日久近加身熱便泄兩目赤翳是膿出過多肝木失養之故大豆卷歸身池菊決明子杭白芍碧玉散生地桑葉女貞子桑白皮案脘腹脹痛大便溏泄濕濁內阻肝脾胃三經失和也老蘇梗川朴防風朴烏藥煨木香桑葉香附淡吳萸枳實連皮檳蔻仁另上沉香二分生黑醜三分上皮桂二分巴豆殼二分研末服案吐血大勢雖定而脈來數大不靖舌苔淡黃乃五志之火內熾肺經為其蒸灼也羚羊角丹皮石膏紫菀絲瓜絡碧玉散知母煅牡蠣黑山梔阿膠白芍摩三七二分摩犀尖三分沖案大瘧五旬有餘脘脹痞痛而嘔汗少不便脈數舌黃邪積阻痹氣機防其昏閉之變柴胡桑葉藿梗廣生軍枳實連皮檳鬱金川朴橘紅草果仁蘇葉闢瘟丹三分案瘧久結癖得汗不暢當從榮衛間疏達柴胡防風枳實草果皮桑葉冬瓜皮葛根豆豉桃仁連皮檳竹茹案寒熱月餘汗少面浮邪戀傳脾再延防變麻黃光杏老桂木桃仁冬瓜皮防風枳實前胡桑葉草果皮豆豉連皮檳葛根竹茹案初瘧半月汗出不暢近加面浮腹脹防其成臌老桂皮柴胡草果皮枳實紫蘇方通草冬瓜皮川朴連皮檳橘皮桑葉案腹脹復發又經半月大腹滿痛水濕積滯均有之當從二便圖治商陸官桂澤瀉連皮檳五加皮備急丸一分半木通苓皮枳實冬瓜皮淡薑皮案脈形左手細小右手帶數舌苔黃膩無夢而遺者氣虛不攝濕熱渾竅腎關不固也南沙參金櫻子川萆薢茯苓神炒蓮鬚封髓丹二錢淮山藥大有耆白尖芡白蒺藜金鎖固精丸二錢案頭痛偏左爾後為甚風邪不言可知然好酒必有痰熱入絡制殭蠶池菊絲瓜絡桑葉橘紅絡枳實丹皮法半夏蔓荊子鉤鉤荷葉邊案脾運不及則有形凝聚仲祖於太陽一篇本有腹滿之訓閲前方以宣通為治頗有益仍從此意立法粗桂枝連皮檳連皮苓小茴香葫蘆巴臺烏藥青木香川楝子制香附焦枳殼上沉香餘糧石二錢連殼砂仁沉香化氣丸錢半案淋濁痛勢極甚右尺滑數不靖濕熱蘊伏下焦腎陰虛而相火熾治從兩顧之法地骨皮生山梔萹蓄草赤豬苓萆薢草梢石蓮子海金砂牛膝梢白茅根滑石荸薺二妙丸一錢半當歸龍薈丸二錢案瘧因強截身熱不退再加外風咳嗽苔黃太陽少陽合病也麻黃橘紅法半夏光杏枳殼豆豉象貝前胡鬱金薄荷射干案寒熱至而經停其病外輕可知且用當歸桂枝同小柴胡出入必得熱退方免損怯當歸尾秦艽赤芍柴胡法半夏白薇延胡五靈脂桂枝荊芥桑葉無參回生丹半粒化服案病後熱又一旬兩脈數大邪受於表積蒸於裡驚閉最易豆豉光杏萊蔔子紫蘇葛根川朴桑葉前胡鬱金枳實佛手案諸象皆減惟膚溲俱黃蓋黃為土色明是土虛則色泛於外仍宜運脾化濕蒼朮茵陳滑石革蘚秦艽赤豬苓川楝子淡吳萸四分同炒前胡桑枝通草藝曲功勞葉案咳嗽汗少身熱夜甚治宜清泄太陰麻黃黑山梔生石膏光杏連翹橘紅桔梗前胡牛蒡子淡芩薄荷竹茹案恙後濁蘊化熱胃逆不降以致頻頻嘔惡舌苔黃厚入夜胸脘煩灼二便不利諸恙彙集也法半夏雅連茯苓生石膏代赭石藿梗橘皮枳實竹茹鬱金檳榔丸錢半備急丸一分五釐案去冬類中今又復發幸而左邊一手仍可舉動身中之氣血尚可周流貫注安養調治庶可恢復細生地潼沙苑當歸川斷杞子橘紅陳阿膠菟絲餅杜仲白芍狗脊桑枝案大熱稍挫邪蘊不達以致咳仍朝甚痰沫不濃苔黃邊絳音啞不揚也金沸草羚羊角象貝桔梗蟬衣淡芩滑石生石膏粉前胡桑葉玄參另金礞石風化硝天竹黃川貝母四味同研細末先服案一熱即驚危重可知欠乳之體焉能相競備商蟬衣枳實桑葉鉤鉤蘇葉薄荷前胡豆豉上川朴靈寶如意丹十粒案瘧久寒不栗熱不退陽明之症由少陽所歸不忌口腹致色黃面浮遠則恐損近則防臌香青蒿黑山梔紫蘇連皮草果滑石連皮花檳冬桑葉豆豉川朴連皮赤苓酒芩案産後寒熱咳嗽必因外邪乘虛而入蓐勞可懼豆豉象貝蘇子梗秦艽前胡鬱金當歸川朴茺蔚子光杏仁生薑紅棗案先熱後寒舌黃腹痛經邪腑積交阻為患慢驚最易羌獨活砂仁柴前胡撫芎薄荷頭南楂炭焦神麯赤苓白桔梗枳實摩木香摩花檳沖案素有脫肛腸紅去冬又增痛淋而今痛勢雖定淋勢時輕時重當從氣虛濕陷例治西洋參碧玉散升麻茯苓煅牡蠣蓮鬚大有耆防風焦白朮龍齒柴胡威喜丸三錢案徒然發驚之後發熱此非外邪所因乃風陽上旋恐成癇症炙龜板石決明天麻制蠶楂炭橘紅白石英杭白芍龍齒半夏蠍尾鉤鉤案初瘧兩旬遍體浮腫耳後紅腫防發外瘍金沸草苦葶藶淡芩生山梔花檳板藍根草果皮大貝母楂炭連翹薄荷冬瓜皮案經云心與小腸相為表裡多於跋涉則陽動事多拂意則火盛致為小溲短赤則兩目色紅古人導赤散與症相符出入投之木通黑山梔豆卷大腹皮桑白皮赤茯苓秦艽滑石桑枝淡竹茹海金砂案淋濁似有若無肛門近又作痛脈來滑數舌質光紅濕火下注攻走不定也玄參寒水石連翹知母淡芩生石膏生山梔碧玉散竹葉茅根丹皮漢防己案麻桂開泄辛苦降逆飲勢盤踞不解咳嗽尚不能止王氏云甚於清晨者宜參鹹寒海蛤殼連皮檳枇杷葉光杏法半夏蜜炙橘紅生苡仁杜蘇子半貝丸錢半浮石鬱金鮮杜竹茹案月信前後腹脹且痛衝脈有寒肝脾之氣違和也全當歸小茴香五分同炒川芎砂仁香附五靈脂寧坤丸一粒赤白芍延胡烏藥桂木月季花案因傷致咳邇日漸漸形衰力乏宿傷仍在其血易見古詔五勞七傷此症類是旋覆花北細辛橘紅絡茜草蘇子梗款冬花光杏仁炙紫菀左秦艽前胡陳猩絳川鬱金摩案寒熱雖退而又痛泄良由榮衛和而肝脾之氣不和也停經日久亦須兼顧秦艽沉香曲茺蔚子赤芍全當歸檀香穀芽砂仁摩木香延胡索丹皮玫瑰花青蒿案瘧後連熱又加咳逆伏邪為主新風為輔喘驚兩字只恐不免射干薄荷前胡枳殼橘紅豆豉白金丸三分研服牛蒡光杏象貝靈寶如意丹七粒案濕濁阻氣寒熱脘痞嘔惡舌黃得汗不解是似瘧也蘇梗川朴廣藿香江枳實香附草果皮半夏橘紅制茅朮連皮檳桑皮溫化丸三錢案榮衛失和濕濁內戀是以脘痞舌黃微寒發熱也制茅朮連皮檳陳皮豆豉枳實杜竹茹川雅連上川朴淡芩黑山梔桑葉摩烏藥四分案肝風夾痰頭暈舌黃時覺烘灼脈來弦滑宜從肝胃並治制烏藥歸身白芍潼白蒺藜茯苓神桑枝陳阿膠天麻牛膝白石英石決明案疸瘧幾及四候積滯已清今又暢汗而熱仍不退舌色干黴時而噦惡乃濁邪交蒸化熱陰液被劫恐有昏陷之變元參二錢連翹三錢雅連二分生石膏五錢打益元散四錢包生地三錢蟬衣錢半淡芩錢半知母錢半竹茹一錢炒川石斛三錢摩犀尖沖三分茅根肉去心一兩案幼嬰産未盈月身熱已經八日熱至似有寒意而不甚得汗不暢時而噦惡大腹按之微膨陰囊腫如晶球脈滑數而帶弦舌薄白而膩此由産母感暑內胎應之蘊於少陽之間染成似瘧時症暑必夾濕濕為水類侵入囊中幸而余處未腫不致蔓延於上耳免節外生枝小兒體屬純陽熱甚之際恐其暴風鴟張即有牽引經絡為瘛瘲之變擬方商進黑山梔粉葛根草果仁連翹楂炭豆豉通草枳實連皮檳川雅連淡芩竹茹鮮荷葉案症經十有二日伏邪夾濕蒸遏氣分初則起伏繼而熱盛時見糊語通宵不寐曾得汗而不解大便日泄數次舌淡黃厚脈至不揚未病之前已覺不寧良由心神不定況又暑喜入心所幸中焦尚健未盡入內恐其延久而變昏陷則去生遠矣明見正之豆豉滑石塊上川朴通草黑山梔赤苓神燈芯桑葉淡黃芩紫豆蔻勿打入煎佛手鬱金薄荷梗案風溫襲肺釀濁成痰以致咳嗽痰白脘痞氣逆脈數微熱也麻黃光杏仁荊芥前胡薄荷萊蔔子橘絡川朴牛蒡子象貝枳實桑皮摩鬱金四分案由瘧而變連熱膚色萎黃力乏舌色濁膩脈象濡數瘧本傳脾勞碌亦傳脾最恐淹纏入損青蒿橘皮絡紫蘇豆卷桑葉枝連皮檳淡芩上川朴秦艽萆薢功勞葉連皮苓案浮腫往來不一繼由風寒濕滯困之足太陰乏力運化而然也最怕腹脹之變上川朴香櫞皮通草赤豬苓焦麥芽舟車丸澤瀉連皮檳枳殼冬瓜皮嫩防己溫化丸案內經臟象肝生於左耳脹而癢腹脹而撑皆盛於左者肝家風火之象也丹皮夏枯草砂仁殼香附白芍吳萸四分同炒鉤鉤生石決明木香合歡皮陳香櫞池菊制蠶摩開心果五分摩上沉香三分案不咳而嗽胃痰故也痰中見紅肝火熾也左脈弦數右手濡滑刻下血雖止嗽未平終屬不宜如此脈象恐其久延為損桑葉光杏橘紅黑山梔竹二青枇杷葉法半夏丹皮茯苓薑皮絲瓜絡海蛤殼青黛挫打案邪熱由於陽明兼涉厥陰則不哭無淚牙疳在於穿腮當可多延一二若發驚厥即在交睫之間瘍科先生立方可謂面面俱到再當擴充可也摩犀尖豆豉生梔鮮地同打粉丹皮竹葉蘆根大川貝鉤鉤竹黃片鬱金上西黃一釐玉樞丹二分研末服案瘧後灑淅寒熱舌苔半白乃余濁未盡因勞而發也丹參草果前胡獨活枳實鬱金秦艽蘇葉淡芩川斷桑葉橘紅案脘部結癖今移於右滿腹膨脹二便不利是脾肝鬱結營衛失和反復無定也草果仁延胡木通香附山三稜商陸連皮檳老桂木乾薑沒藥枳實舟車丸錢半備急丸一分五釐案先咳後熱今又嘔血脈象左手數大舌色光紅有汗風熱外入宿傷在絡恐沖淡豆豉前胡杏仁絲瓜絡丹皮荊芥冬桑葉紫菀鬱金牛蒡子上三七三分黑山梔三分研末服案便泄腹痛後有紅色氣損絡虛營陰虧損也歸頭炭煨木香赤白芍五穀蟲於木炭荊芥槐花炭紅神麯荷葉蒂春砂仁炒青皮案子和云七疝大抵屬寒而厥陰之病為多腎子日大不痛不熱名曰㿗疝最屬難愈之症小茴香青皮青木香大當歸吳萸玄胡索老桂木山楂川楝子橘紅絡桃仁上沉片案寒熱月餘汗少邪戀傷脾再延防變麻黃前胡桑葉桂木花檳草果仁防風光杏薑皮枳實川朴冬瓜皮案初瘧半月汗不通體近加面浮腹脹防其成臌老桂木連皮檳柴胡苓皮紫蘇枳實冬瓜皮草果仁川朴通草桑葉案病經載半刻下熱戀不退經停不行虛損之象已露山川草木恐難圖治當歸丹皮秦艽柴胡茺蔚薄荷淡芩香附白芍桑葉白薇加味逍遙丸錢半沉香化氣丸錢半案病勢稍減惟如夜不得睡多食難消心血脾氣虛而不運再從前法加上一層治之南沙參白芍雞內金連皮檳功勞子葉冬瓜皮五加皮茯神上於術夜合花杏仁炭炒穀芽案不咳則已咳則連聲名曰頓咳每咳必嘔肺氣熱盛防其見血麻黃生石膏前胡象貝桔梗桑葉光杏新會紅牛蒡鬱金薄荷案脈數內熱面黃力乏是郁傷脾脾不運濕濕化為熱也大豆卷制茅朮枳殼茯苓川朴滑石石菖蒲左秦艽鬱金藿梗桑枝川斷案痎瘧三年今又復發而熱不退清頗有陰傷成損之險當歸柴胡豆豉全蘇上川朴桑葉枝陳皮秦艽淡芩知母青皮穿山甲煨草果同研末服案熱至先寒轉瘧可望宿癖乘攻表散里和為善摩青皮川朴全蘇柴胡梢大豆卷佛手草果仁淡芩葛根摩花檳左秦艽案氣分窒痹濁阻聚凝為痛痛而腑結先以溫通上瑤桂二分生黑醜五分煨木香四分上沉香三分廣生軍五分五味共研末蜜丸用砂仁香櫞湯送下案肺為風溫侵襲則津變為痰音啞咳逆金實無聲擬開泄潤肺為主麻黃射干象貝馬兜鈴光杏仁桑葉牛蒡鬱金前胡生石膏薄荷同打蟬衣案氣升多而降少肝病為患也腹滿便艱肋脅作脹治從行氣化濁兼泄下導滯為佐例金沸草吳萸香附商陸花檳上沉香溫化丸一錢金鈴子川朴烏藥枳殼青皮舟車丸五分案咳嗽屬肺肺令不行則外風上受夾痰為患疏降為法金沸草白石英枳實牛蒡鉤鉤橘紅羚羊角粉前胡光杏竹黃薄荷案肺居於上有熱則氣降失司治宜清氣泄化黑山梔川雅連防風淡芩澤瀉通草連翹大豆卷枳殼茯苓竹葉竹茹案熱迫血分經事每月數行而且作痛治宜疏氣涼榮鮮生地木香淡芩白芍蒲黃黑山梔炙龜板丹皮川芎青皮藕節摩沉香三分案下痢載余隱癖攻痛且從肺胃疏泄丹皮枳殼木香摩烏藥連皮檳連皮茯苓草果肉果五靈脂範志曲案産後咳嗽小腹作痛是新風輻輳衃血不清也麻黃蘇子半夏前胡牛蒡薄荷摩降香四分象貝光杏桑枝枳殼鬱金橘紅達痰丸二錢案肝胃雖和濁邪未化所以熱退不清無汗舌黃擬疏中達表法蘇葉鬱金豆豉半夏陳皮連皮檳前胡川朴枳殼香附沉香霜桑葉案大産兩旬而發寒熱汗出半體衃血不多臍下極痛近又便泄脈形弦滑而數舌苔淡黃而膩此由産後正虛伏邪內發留瘀結癖名曰似瘧當從疏泄炒青皮連皮檳柴胡草果桑葉延胡蘇葉煨木香上川朴葛根枳實香附降香屑另生黑醜二分巴豆殼二分木香二分山甲片二分四味研末服案頭痛偏甚於左者肝膽風火痰無疑再豫清熄以望弋獲羚羊角制蠶橘紅絡川芎鉤鉤白芷粉丹皮生決明製半夏桑葉甘菊另外貼頭風膏方用細辛川烏桂心麝香研末放布膏內貼兩太陽案瘧勢不退脈小色晦慢驚肺脹即在交睫之間勉方以圖幸青蒿淡芩鬱金豆豉前胡石菖蒲白金丸一錢橘紅象貝光杏薄荷竹黃靈寶如意丹七粒案紅痢腹痛舌乾心嘈濕熱互蘊先為通因通用煙體當此大非所宜煨葛根赤苓花檳紅曲焦穀芽槐米熟砂仁青皮楂炭赤芍枳殼實香連丸三錢案嘔吐攻撑從下而至脘者為肝木犯胃然脈已數嘔沫帶酸內郁化熱溫方參以苦降半夏上雅連香櫞廣藿梗瓜蔞皮陳皮白茯苓竹茹細香附江枳實摩檀香案因傷見血血止納少作嘔脈濡舌濁者痰濕內蘊陽明氣不宣降也紫廣皮新絳白殘花檀穀芽冬瓜子廣藿香茯苓杜竹茹功勞葉案經停日久近加內熱欲便痛者氣血皆病矣乾血根萌全當歸延胡柴胡薄荷青皮玫瑰花制香附秦皮丹皮白薇茺蔚四制香附丸案宿傷未去則脅痛氣逆濕濁內阻則納少嘔惡宜溫足陽明足厥陰例治金沸草橘紅絡制香附淨穀芽上川朴竹茹左秦艽製半夏廣鬱金炒枳殼摩降香案便泄自夏及秋雖則較減而脾元未復能食難化恐滋腹滿之虞五穀蟲青陳皮穀麥芽雞金和中丸錢半連皮檳榔範志曲赤白芍青香櫞上川朴香砂枳實丸錢半連殼砂仁案痰由濕化火從氣生脘中似嘈非嘈若痛不痛辛涼佐以鹹味已應當以原法擴充煅蛤殼半夏曲枳殼茯苓神遠志曲川貝母炒青皮杜竹茹穀芽細香附瓜蔞皮案咳久舌黃脈仍右大風燥外襲濕熱內戀素有不夢自走且以湯丸分治蜜炙桑葉冬瓜子馬兜鈴鬱金光甜杏象貝母蜜炙橘紅生苡仁法半夏竹茹鮮枇杷葉茯菟丹三錢案年屆十七身雖長大天癸未至榮分未充可知所以背部兩足不時發熱頭旋掉眩面色無華恐其秀而不實玄武版厚杜仲蒺藜丹皮九孔石決明女貞子大有耆白芍牛膝沉香炒穀芽案咳熱稍輕痰白不濃兩脅作痛嘔噎作干是風邪化熱絡氣失和也桑皮薄荷白桔梗旋覆花甜葶藶光杏元參前胡橘紅絡生石膏象貝母鬱金案便雖數行嘔未全止乃胃氣已逆行欲降無權也釘頭赭石生石膏藿梗茯苓雅連左金丸五分白石英法半夏竹茹橘皮枳實案開而復閉皆由熱與痰蒙故也波折當此藥恐不持九節菖豆豉鉤鉤薄荷鬱金紫雪丹二分天竺黃制殭蠶蟬衣川貝淡芩案喘屬於肺脹屬於脾先脹後喘脾病傳肺脘部更硬想是脾之磨運失司肺之肅降少權胃居於中安能和降如常乎金沸草連皮檳桑葉鬱金半夏上川朴葶藶子冬瓜皮橘紅前胡枳實控涎丹五錢案瘧延兩月汗出面浮邪蘊不達脾肺氣傷恐有腹滿之變麻黃防風川朴草果皮連皮檳桑葉前胡光杏枳實冬瓜皮帶皮苓通草案瘧久傳脾寒熱無序面黃色浮腹亦脹滿乃邪蘊少陽濁阻脾胃脾胃屬土土傷則榮衛失和也柴胡淡芩象貝草果仁連皮檳茯苓皮紫菀豆豉枳實冬瓜皮冬桑葉舟車丸錢半案脘部脹痛已經多年此度已發數月不但脘部脹痛抑且經亦不行正所謂氣為血舟氣鬱則血亦郁也高良薑全瓜蔞草果川朴枳實烏藥花檳制香附薤白頭青皮蘇葉梗另上沉香二分生黑醜二分上瑤桂一分巴豆殼五釐研末服案病後強食則脾土受傷肝木乘侮須怡情逸志以助藥效當歸香附香櫞帶皮檳檀香炒穀芽砂仁川斷柴胡秦艽杭白芍吳萸同炒摩烏藥五分沉香三分沖服案病經五月始起似屬風溫之象而今氣鬱生火火盛生痰清靈之處日被痰火所蒙是以喉中如痹火盛氣升左脈如無右手弦滑而數夜不能寐舌色漸減此名痰火須從氣鬱痰阻論治開懷怡情方顯藥效茯苓四錢光杏打三錢鮮枇杷葉五片腹皮錢半枳實錢半竹茹錢半珍珠母細香附打二錢薑皮三錢海蛤殼打六錢另上西黃三分石菖蒲二分貝母三分研末服案酒濕內郁化熱成瘡當從榮衛清泄川雅連羚羊角生山梔苓皮桑葉象貝碧玉散忍冬藤淡黃苓丹皮防己紫草龍薈丸三錢案疸瘧月餘又成牙疳雖未穿腮忽已落齒恐不足持元參淡芩象貝生石膏人中黃蘆根尖川斛生山梔知母連翹薄荷頭摩犀尖五分沖復診加菖蒲根上西黃川貝母同研末服案咳嗽幾及三載近日再加嘔吐肺病及胃前方既應再當清而宣之象貝熟石膏粉前胡金沸草蘇子梗薄橘紅麻黃留節製半夏光杏仁煨代赭北細辛薑竹茹案滯下兩季仍見裡急脈舌相參虛實各半仿古散法肥兒丸二錢香連丸一錢炮薑炭七分山楂炭四錢炒青皮一錢以上五味同研細末分七日服案脾主四肢多動者必傷於脾脾傷則陽氣下陷濕寒隨注病退十七當參補益東洋參金狗脊萆薢黃耆秦艽生熟穀芽全當歸生苡仁川斷牛膝白朮連絡陳皮案腫由足及於腹由腹而至於面濕勝於風二便皆塞且用開泄浮萍冬瓜皮花檳赤豬苓生苡仁舟車丸一錢桂枝粉前胡薑皮澤蘭澤瀉方通草溫化丸一錢案先為身熱繼則咳嗽舌絳邇來汗少乃伏暑內蘊風邪襲於手太陰經手太陰屬肺而居於上肺之氣化不行水氣泛濫所以面浮肢腫接踵而至也為勢非輕恐有腹脹喘驚之變麻黃橘紅川朴老桂枝木牛蒡江枳殼前胡光杏薄荷白萊蔔子防風冬瓜皮案似瘧日久肆食致重蓋食則多熱熱則入心為昏閉傳厥陰為驚厥青蒿皮川朴淡豆豉淡芩花檳桑枝葉佛手粉葛根黑山梔滑石薄荷同打案瘧止復來因勞而然仲祖所謂勞復是也脈小而數虛實各半擬小柴胡法南沙參知母豆卷帶皮檳山梔秦艽冬桑葉柴胡淡芩統紫蘇草果案瘧已五閲月矣刻下寒熱依然舌光脈小咳嗽氣逆納漸遞減有成損之險無向愈之象當歸淡芩柴前胡清水豆卷光杏桑葉象貝鬱金蘇子梗蜜炙橘紅秦艽案欠乳傷脾脾疳已成雖服藥餌無力回春矣南沙參金石斛淡芩青蒿木香扁豆衣胡黃連上於術淮藥白芍桂枝一分同炒桑葉砂仁案寒熱力乏舌黃灰脈象數邪濁因勞而發誤食滋膩所致非輕恙也香附烏藥前胡全蘇秦艽達痰丸錢半方通枳實枳殼花檳桑葉川朴蔻仁末四分案勞勩未復自然力慵神乏外風戀客無怪咳嗽痰多病分標本治當兩顧秦艽橘紅絡光杏當歸鬱金功勞葉川萆薢川斷桑葉梗前胡貝母建曲寧咳健脾丸一錢五分案經停腹痛爾後身熱肝脾不和延恐乾血重症歸尾香附延胡連皮檳青皮烏藥玫瑰花撫芎柴胡另上桂心四分生蒲黃一錢五靈脂七分沉香五分酒軍一錢炙山甲五分六味同研末紅糖為丸日兩次服案諸恙雖減惟咳不平肺氣上逆所以面色仍浮也冬瓜子皮象貝母鮮薄荷桑皮薑汁炒苓皮前胡苦葶藶金沸草達痰丸蘇子鬱金枳殼案營虛氣鬱心悸寒熱脘腹攻痛嘔惡便泄久延非宜丹參砂仁枳殼煨木香連皮檳辰茯苓白芍桑葉竹茹範志曲炒白薇摩烏藥案脈象未清仍從手太陰肅降夫肺為乾天屬金必辛涼甘潤為主桑葉枇杷葉甜杏仁淨蟬衣冬瓜子鬱金桔梗象貝母生苡仁雞蘇散雪梨肉案食物不化變為便泄泄則傷脾脾與胃以膜相聯所以脾病則胃亦病矣南沙參茯苓神廣皮桑枝葉廣藿梗穀芽夜交藤製半夏砂仁建曲健脾丸硃砂安神丸案得汗不暢邪未外達所以寒熱仍作腹撑舌黃也桂枝尖白茯苓蘇葉柴胡橘紅草果仁青皮連皮檳上川朴滑石枳殼竹茹冬桑葉案咳久內熱已延兩月痰白不黃得汗不解是風為濁戀不易達化也麻黃光杏淡芩蘇子橘紅金沸草前胡桑皮薄荷半夏石膏冬瓜子案脫力日久近加寒熱乃伏邪乘勞而發也老桂木獨活苓皮草果皮柴胡當歸金狗脊桑葉秦艽冬瓜皮竹茹案瘧久不已面浮汗少邪戀於脾脾不運化恐有脹滿之變麻黃防風枳殼前胡生苡仁豬苓桂木苓皮通草桑葉草果皮案經行落後或淋帶遷延是氣虛血寒經絡失宣也細生地玫瑰花當歸白芍香附五靈脂大有苠防風炒干佩葉川芎杞子艾葉案便雖暢行脘腹稍舒是濁阻氣痹肝脾失於條達也上安桂枳殼沒藥三稜通草草果延胡連皮檳商陸川朴烏藥備急丸一分五釐滾痰丸錢半案寒熱腹撑皆減然病屬七情所致必得怡暢情志方不入損當歸玫瑰花柴胡赤芍吳萸四分炒丹皮延胡砂仁花檳摩烏藥白薇薄荷茯苓香附降香案上午之熱已退夜分之咳未已晨起苔灰痰出黏膩邪濕固然未清榮衛亦屬不和前方既應逍遙再投再添泄肺化胃之品當歸秦艽法半夏橘紅光杏仁柴胡竹茹淡芩薄荷上川朴鬱金金狗脊案經云夏傷於暑秋必成瘧瘧雖不離少陽然口渴舌光熱不退清則兼涉陽明古人於瘧之一症必以小柴胡為主方既見胃病當用歸桂柴胡白虎意桂枝尖四分淡芩錢半草果七分鮮藿梗半尺淡豆豉三錢佛手錢半帶皮檳三錢柴胡七分半夏二錢肥知母錢半荷花瓣七片案睪丸日大不脹不痛氣虛下陷寒濕襲入經云肝絡環陰器雙丸主腎前用流氣通絡和血緩下之品未覺響影其為痼症無疑惟不納藥姑以丸方治之橘核丸二錢金匱腎氣丸錢半補中益氣丸錢半砂仁湯下案經停腹痛爾後身熱肝脾氣血不和延恐乾血重症歸尾玫瑰花延胡連皮檳撫芎制香附青皮烏藥春柴胡另上桂心四分生蒲黃一錢沉香五分五靈脂一錢生軍川甲共研末紅棗為丸勻兩次服案似瘧半月汗常頭出近加面色黃浮腹痛便泄是瘧久傷脾脾不運化之故老桂木柴胡葛根桑葉冬瓜皮通草草果皮川朴豆豉楂炭江枳殼淡芩案咳嗽雖爽喉燥嗌乾身熱不退脈浮而數乃風邪未散猶然化熱蒸痰也荊芥元參射干生梔碧玉散橘紅牛蒡象貝蔓荊桔梗淨蟬衣桑葉熱勢漸和喉仍乾燥痰白或紫今見血絲是溫化熱肺絡內傷再擬清氣涼營法鮮生地象貝川石斛元參生梔摩犀尖三分沖生石膏紫菀肥知母桔梗鬱金案懷妊而患起伏疸瘧今已十有二日夜分神糊舌黃滿布煩悶無汗脈象沉數伏暑與濕皆重最怕動胎神昏等變炒豆豉山梔淡芩薑汁炒鮮藿梗囫圇砂仁大腹皮冬桑葉佛手另薄荷梗九節菖鬱金各三分研末以佩葉露荷花露各二兩調下得汗熱退仍屬起伏然伏暑夾濕蘊於氣分之故每每如此刻下病在出入之際加以有娠豈可忽略上川朴桑葉子芩淡豆豉連皮檳佛手鬱金紫蔻仁山梔竹茹鮮薄荷另九節菖老檀香各三分同研細末勻兩次服案症勢大減惟咳嗽一症病易愈而根難拔宜謹慎而緩圖之金沸草前胡鬱金桑葉象貝生苡仁枇杷葉光杏橘紅半夏竹茹北細辛案時症之後得脘窒便泄寒熱邪又輻輳濁滯不化有陰虛成損之險蘇子梗桑葉烏藥帶皮檳穀麥芽砂仁柴胡青陳皮上川朴神麯大豆卷川桂枝香砂枳實丸案腹痛乏力微有寒熱脘部作疼嘔惡面黃是脫力夾邪胃氣失和也良薑燕白全瓜蔞香附廣皮川斷上川朴牛膝蔻仁左秦艽枳殼竹茹溫化丸錢半備急丸一分五釐案辛涼甘寒治肺胃熱退脈緩可知風溫內蘊非無徵也然咳痰尚多前賢治其一面之例馬兜鈴光杏冬瓜子桑皮滑石通草竹茹生苡仁象貝海浮石橘紅另鬱金白芨川貝研末先服案瘧久脾土受傷傷則濕聚蒸痰是以獨熱不寒舌黃滿布脈象濡數小溲混赤也恐入損境上雅連新會皮滑石淡芩赤豬苓福澤瀉大豆卷製半夏通草佩葉採藝曲二妙丸錢半案內熱已退腹痛亦安誠佳事也能於外不勤勞內無忿恨方可慶全當歸丹參皮香青蒿白蒺藜玫瑰花鉤鉤尖秦艽青陳皮延胡索滁菊煨木香四制香附丸案經行而停寒熱日久得食脘腹不舒脈象漸見細數邪濁內戀元正日虛頗有成損之險當歸黑山梔香附茯苓豆卷穀芽柴胡桑枝葉秦艽丹皮薄荷淡芩香砂枳實丸案風邪襲肺身熱痰白噦惡舌黃得汗不暢且從陽明疏達麻黃光杏牛蒡前胡竹茹杜蘇子桑皮桔梗枳實薄荷橘紅摩鬱金四分案勞倦受寒由寒停積以致腹脹而痛體酸身熱不一而作也蘇梗川朴桂枝尖前胡烏藥金狗脊秦艽枳實連皮檳桑枝蔻仁溫化丸三分沖寒熱稍衰氣短色浮脾肺同病兩顧為治桂枝川朴金沸草羌獨活桑枝蘇子葉半夏枳實連皮檳冬瓜皮陳皮摩沉香三分沖案身熱不揚腹痛便膩是邪積挾濁阻於太陽陽明故也蘇葉防風煨木香烏藥前胡桑葉川朴枳實蔻仁帶皮檳煨葛根檳榔丸二錢溫化丸一錢案似瘧一月形瘦力乏面色無華得汗不暢是勞傷脾土邪濁留戀也制茅朮白朮青蒿大豆卷桂木秦艽金狗脊川朴枳殼製半夏桑葉茯苓案大便雖行得汗不暢肢寒身熱面色黃浮濁邪不化脾胃同病也麻黃川朴桂枝尖前胡豆豉金沸草防風枳殼草果皮薄荷桑葉方通草案便血復來前後不一脘腹時覺作痛舌苔黃膩乃濕邪蘊於大腸肝脾胃三經不和也荊芥炭地榆炭川朴於術烏藥茯苓槐米炭上雅連白芍紅曲藕節駐車丸案表邪方解里積又傷脾升胃降皆失其常食物起居必使其適宜辛溫苦芳以調中下蘇葉佛手豆卷烏藥秦艽上川朴廣藿範志曲香砂枳實丸錢半溫化丸錢半同服案寒熱咳腫汗少脈浮風水阻於肺脾二經合病也恐變喘促蜜炙麻黃桑葉枝前胡光杏防風焦麥芽連皮檳榔赤豬苓橘紅通草象貝舟車丸案古云足腫乃脹之始上咳是喘之漸又云先脹後喘治脾先喘後脹治肺足腫而繼上咳者當先治脾然咳勢較重治腫亦不可緩且擬越婢青龍等法蜜炙麻黃後下煨石膏前胡光杏老桂木枳殼冬瓜子皮北細辛橘紅雲苓金沸草鬱金案脈細而弦弦為肝氣有餘細為陰液不足補陰之藥味勝於氣疏氣之品辛多於甘獨顧一邊猶恐顧此失彼姑選酸甘辛芳之品白芍吳萸炒川斛橘葉紅川楝子蜜炙香櫞沉香化痰丸錢半青皮木瓜上沉香黑豆衣小溫中丸錢半脾約麻仁丸錢半案肝脾失和濁滯內阻且用疏中通腑法川朴青皮制軍香附光杏仁黑山梔枳實全瓜蔞花檳蔻仁摩沉香三分沖案得汗不暢大便未行邪積無路可泄再為雙解麻黃青皮石膏橘紅前胡連皮檳桔梗牛蒡薄荷黑山梔枳實滾痰丸七分案腹脹又盛而且作痛再從太陰陽明疏通老桂木川朴香附草果皮烏藥桑枝連皮檳木香枳實川木通控涎丹溫化丸錢半案頭暈已平烘熱未退再為清養以濡之炙龜板白芍丹皮石決明天麻桑枝羚羊角蒺藜茯神煅龍骨鉤鉤竹茹案脘腹攻痛而為下痢是暑濕挾積交阻脾胃也川朴枳實生軍烏藥木香紅曲花檳楂炭乾薑茯苓通草案肝風夾痰內阻而蒙機竅恐成症半夏鉤鉤白石英金沸草制蠶鐵落鬱金竹黃薄橘紅煨天麻決明礞石滾痰丸案衛氣翕開不和遂為寒熱口膩痰多舌色黃厚口渴喜飲心悸眩暈臟真亦虧邪濕留戀用藥有顧此失彼之難病勢無一掃而清之效矣當歸炭竹茹桑子半夏秦艽鉤鉤尖丹參炭青蒿香櫞附橘紅蔻仁和中丸案先為面浮繼漸入下腹亦滿二便少風襲於上滯傷於下且用開泄必得汗便俱暢庶免喘急浮萍防風前胡連皮檳赤豬苓川通草枳殼上川朴光杏冬瓜皮澤葉瀉舟車丸案寒甚極熱壯熾似屬瘧象第熱退不盡無汗咳嗽風邪伏邪同病也浮萍前胡薄荷柴胡鬱金象貝葛根光杏豆豉酒芩花檳黑山梔滑石案瘧久加以浮腫邪濁傷脾之故恐變驚久成臌青皮草果桑皮淡芩桑葉赤茯苓花檳川朴薑皮豆豉青蒿冬瓜皮案恙延八月不寒連熱兩足為甚咳嗽痰紅汗泄不暢痰穢噴人是風戀日久內蘊化熱蒸痰灼肺肺絡暗傷也炙紫菀生石膏淡芩薄荷連皮檳冬瓜子象貝母粉前胡橘紅丹皮摩犀尖摩鬱金各三分案便血日久用補中歸脾而覺氣墜多泄者是脾氣大傷統攝無權也西黨參大生地白芍升麻訶子肉御米殼大有耆防風根炒野於術淡芩柴胡石榴皮駐車丸十灰丸各錢半案有夢而遺心火先動背脊作痛精虧之象青囊斑龍丸荊公妙香丸各二錢大補陰丸二錢分上下午服蓮心湯下案汗便雖得邪未盡達所以熱勢不退而尚煩懊也再從肺胃清泄射干鬱金豆豉黑山梔竹茹牛蒡子淡芩前胡橘紅桔梗連翹鮮薄荷洗打四錢案小産之後脘腹鼓脹胎墮之後小瘥繼則動氣以致腹又膨脹惟慮成痼不治老桂木草果皮連皮檳川朴延胡枳實商陸案蒂丁下垂恙後當此是氣火上熾陰液不足也西洋參馬勃淡芩連翹雅連白茅根黑山梔元參象貝竹茹丹皮碧玉散案脈象揚抑不齊中氣為痰所阻陽不入陰內經所謂胃不和也仿黃連溫膽法薑雅連茯苓神秫米炭橘紅枳實栝蔞礬半夏杜竹茹薑汁炒京川貝山梔棗仁滑石案胃司納脾司消納多而消遲勞倦傷脾可知脾屬土濕為土氣脈象之濡數稍勞則溲赤陽動則濕蒸為熱也滁菊枳殼通草赤苓神豆卷採藝曲鉤鉤白蒺萆薢功勞葉秦艽穀麥芽案鼻漏濁涕謂之鼻淵此由風溫上襲而走孔竅雖屬多年尚宜辛散辛夷牛蒡桔梗白芷蒼耳子蔓荊子蔥管一尺黑山梔滁菊蟬衣薄荷松羅茶藿肥丸二錢案五更寒暑常為寒熱加以操勞不輟月事不行脈舌參之元正固虛邪濁尚戀古云鞭長莫及此症是也當歸桑葉枝柴胡茺蔚澤蘭加味逍遙丸二錢上川朴功勞葉秦艽淡芩豆豉四制香附丸二錢案咳嗽之恙本難速愈況為日久屢治屢發治平則易杜根則難冬瓜子光杏象貝法半夏鬱金桑皮枇杷葉甜葶藶前胡橘紅薑汁炒竹茹案得汗熱退汗止熱起的是濕邪熏蒸之故有娠當此最易增變黑山梔子芩佛手上川朴桑葉滑石豆豉腹皮桔梗通草連蒂荷葉半張案獨熱不寒病在陽明陽明為中州之地出入最易恐變驚閉黑山梔花檳上川朴淡芩桑葉紫蘇豆卷枳實通草滑石佛手案經事愆期且兼寒熱攻痛而見右脈大者先治其標全當歸柴胡薄荷甘菊延胡赤芍桂枝四分茯苓神桑葉秦艽澤蘭穀芽茺蔚案積勞為本邪濕為標標急於本治標為主治本緩圖獨活豆卷甘菊蘇葉梗上川朴蠶沙枳殼秦艽通草桑葉枝前胡案瘧邪未楚因勞復發當從少陽疏達葛根柴胡草果蘇葉梗川朴獨活秦艽枳實桑葉新會皮延胡案風邪襲肺咳嗽痰黏症勢甫起疏達為法無如素有血症恐其引血上乘荊芥前胡橘紅冬瓜皮光杏仁紫菀牛蒡象貝半夏桑葉皮薄荷頭竹茹案先痢後熱表裡俱病勢非輕淺恐成慢驚仿通則不痛通因通用之法煨葛根荊芥炭淡芩枳殼使君子赤茯苓熟砂仁紅神麯青皮赤芍摩沉香摩木香各三分加楂炭末五分案似瘧乃少陽之病左腹微滿絡間欲假氣血痰滯而成癖矣癖則臌虛則損青蒿秦艽淡芩全蘇枳殼通草豆豉川朴黑山梔桑葉佛手青皮花檳各六分沖案初瘧日久又加浮腫便紅標本同病恐有腹滿喘急之險連皮檳榔柴胡荊芥炭淡芩血餘炭青皮連皮草果荷蒂葛根炭豆豉冬桑葉楂炭案瘧變為痢復又傷風致增咳嗽身熱且從太陰陽明治之煨葛根荊芥楂炭桔梗橘紅枳實桑葉防風根烏藥茯苓前胡摩花檳摩木香各三分沖案初瘧月餘汗少加咳是復感新風襲肺也麻黃光杏製半夏前胡藿梗公丁香川朴桑葉草果仁橘紅楂炭冬瓜皮案伏暑新風夾痰以致身熱咳逆腹脹而嘈汗泄不暢麻黃光杏牛蒡子前胡橘紅草果仁淡芩枳實連皮檳川朴鬱金冬桑葉案瘧方三次遽爾堵截則邪伏濁遏趁其外不停作內發隱癖以致腹痛攻撑寒熱似瘧擬芳香宣泄秦艽上川朴豆卷全蘇枳殼赤芍吳萸三分同炒香附沉香連皮花檳摩烏藥摩青皮沖案獨熱不寒咳嗽嘔吐外風引伏邪病在肺胃二經如入厥陰恐變喘驚薄荷前胡光杏象貝楂炭蔔子橘紅桑葉豆豉鬱金牛蒡枳殼案寒熱已退便泄咳嗽詢知過叨所使仿金匱移食例治豆卷沉香曲烏藥煨木香麥芽新會皮赤苓連皮檳通草雞內金青皮陳香櫞案寒熱而見咳嗽必涉於肺肺司皮毛似可假汗一達然右脈澀而不暢誠恐昏喘之變豆豉麻黃枳殼前胡辰滑石光杏仁象貝蔔子鬱金薄荷冬桑葉案瘧來不一而作無非伏邪逗留於少陽陽明之間寒既戰栗熱若燎原擬桂柴白虎意桂枝尖肥知母柴胡草果酒炒芩秦艽花檳蘆根淡豆豉紫蘇桑葉案惡寒已罷脈數亦靜至於邪去正傷勢所當然猶乎賊到蹂躪賊去自然修葺完固正所謂醫家如兵家耳丹參二錢桑子二錢桑枝五錢黑豆衣三錢穀芽四錢青蒿二錢陳皮一錢秦艽三錢歸身炭二錢淮於術一錢竹茹一錢香櫞一錢枳殼一錢案寒熱不慎口腹致為遍體腫脹已見咳嗽喘息難免青蒿錢半麥芽三錢草果五錢建曲二錢澤蘭瀉各二錢桑皮三錢桑葉一錢花檳錢半上川朴七分赤苓二錢桂枝五分生苡仁四錢冬瓜子皮各五錢案胃為六腑之海以通為用胃病則通達自失無怪其納減如前胸似砥柱也烏藥薤白鬱金香附全瓜蔞焦楂上川朴枳殼沉香麥芽溫化丸二錢案便血不已治宜補中歸脾冀其引血歸經也於白朮升麻白茯苓柴胡十灰丸黨參當歸頭白芍大有耆藕節石榴皮案便行溏水為多脘腹作痛一日數行再當疏胃運脾川朴茯苓花檳廣生軍臺烏藥寸金丹木香枳實煨薑淡吳萸煨肉果案大汗得而熱退去邪達故也穢惡仍而舌尚膩濁未化耳還恐增變豆卷腹皮通草竹茹佛手子芩上川朴黑山梔桑葉佩葉摩烏藥摩檀香各三分沖案便血不止圊數不減尾閭酸舌黃納減想其不但脾胃之濕濁未化抑且督陽衰罷也當更葉氏法出入毛鹿角三分益智二錢茯苓三錢車前子三錢樗白皮一錢臟連丸菟絲餅一錢白芍一錢五味四分禹餘糧三錢荷葉蒂案寒熱咳逆今恰七日胸脅脘痛腹板痰不爽而見紅脈形滑數舌色灰黃此伏暑為新風引發與宿傷同病防其昏喘之變候商金沸草竹茹豆豉橘紅絡薄荷象貝鬱金牛蒡子前胡紫菀另摩烏藥三七生軍三味沖案咳嗽載余近加身熱是濁邪留戀肺氣已傷頗有入損之慮光杏仁前胡丹皮白前桑葉冬瓜皮半夏蜜炙麻黃桑皮石膏象貝橘紅摩鬱金三分案初診脘部痞窒則通體掣痛正所謂胃為十二經之海諸經皆稟氣於陽明也炒乾薑枳實川朴金狗脊左秦艽香附連皮檳烏藥滁菊桂枝尖溫化丸二錢桑枝二診中氣不宣諸氣皆痹金沸草枳實乾薑烏藥桑枝連皮檳赤茯苓川朴秦艽香附薤白三診胃氣失和脾氣窒痹是以遍體掣痛夜寐不安製半夏桂枝尖茯神碧玉散當歸佩葉狗脊威靈仙左秦艽川斷夜合花桑枝獨活案濕熱內蘊為肝火交蒸其勢益甚所以遍發疹塊已歷十載圖治非易羚羊角丹皮蓮子肉生山梔忍冬藤茯苓鮮生地大貝白蘚皮桑枝碧玉散防己案初診年近天命經事未停甚則兩旬一至此度百日而行不但經行如注且有隱紫結塊良由氣生火火勢動徹血海不固也再延防變炙龜板於術淡芩黃柏藕節血餘炭陳阿膠白芍蒲黃丹皮樗皮十灰丸二診經漏漸止脈常帶數數則為熱熱從火生正所謂血之動由乎火也再擬清養之中佐以益氣氣足而脾可固攝矣西洋參玄武板茯苓磁石淡芩石榴皮陳阿膠野於術白芍牡蠣蓮鬚柏子仁三診經漏後甚脘痞氣逆脈形左大於右舌苔淡黃而膩的系濁阻胃中升多降少肝氣肆橫脾乏統攝也製半夏陳皮茯苓豬苓薑皮砂仁佩葉大腹皮白芍烏藥龜板藕節檀香四診漏紅雖止脈見滑數數有熱滑有濕濁顯系所蘊之濕濁尚未盡化虛則肌表失護未免輻輳新邪也南沙參天麻紫石英龜板干佩葉桑葉石決明茯神制茅朮磁石白蒺藜鉤鉤五診脈症稍佳立方似合再從前意出入制茅朮於術大腹皮滑石白檀香半夏桑枝炙龜板陳皮干佩葉藕節香穀芽磁石案血崩之後遍體黃浮股腹攻痛便瀉溲澀是脾傷肝橫土乏堤防水濕泛濫於脾也老桂木川朴連皮檳木通薑苓皮香附草果仁枳實嫩桑枝商陸冬瓜皮琥珀丸舟車丸各錢半案氣機未和濕濁內阻當從太厥二陰立方上安桂川斷連皮檳枳實木通冬瓜皮制香附桑枝帶皮苓另上血珀三分生黑醜四分沉香二分巴豆殼三分研末服案恙延月餘始為遠途傷脾兼感風邪以致足腫與咳嗽並駕齊至喘不得已高年恐有腫滿之變金沸草苓皮桑葉前胡白芍舟車丸錢半淮牛膝苦葶藶蘇子鬱金橘紅半夏達痰丸一錢案汗雖得而咳腫未減是風水夾濁相搏於肺脾之間也金沸草前胡草果皮半夏冬瓜皮川朴薑皮老桂木豬苓連皮檳枳實舟車丸橘紅案得汗不暢大便溏泄熱勢起伏咳嗽煩懊乃邪熱夾濕交蒸肺胃也生石膏枳實石菖蒲前胡豆豉桔梗鮮薄荷淡芩花檳榔連翹木香射干案大便雖行脘腹未舒音啞不持舌黃底絳邪熱夾濕濕聚成痰再從肺胃清泄生山梔淡芩川雅連蟬衣元參淡射干石菖蒲三分象貝馬勃光杏仁桔梗竹茹碧玉散案經行落後色殷而痛舌苔黃膩脈數而鬱是氣滯血熱蒸濕成痰也半夏淡芩川雅連陳皮丹皮延胡麥芽黑山梔花檳干佩葉香附降香莪朮案寒熱屢發面浮腹脹濕邪留戀不食脾傷不運也青蒿淡芩秦艽川朴桑枝連皮檳草果豆豉枳實滑石雅連冬瓜皮案濁邪阻痹肺胃治宜疏中通腑金沸草前胡枳實川朴橘紅全瓜蔞連皮檳半夏香附鬱金蔻仁滾痰丸一錢案寒熱咳嗽面色黃浮是伏暑新風合病再延防驚麻黃光杏金沸草前胡草果皮川朴防風象貝炒枳殼薄荷摩鬱金橘紅案脫力夾邪身熱汗少面色黃浮舌苔厚膩濁戀太陰太陰屬脾勞則傷脾一定之理制茅朮白朮苓皮胡黃連淡芩滑石大豆卷秦艽黑山梔炒竹茹桑葉青蒿案舌光而碎陽邪也色晦而青陰徵也良由風熱為痰所遏驚脹兩字竊恐難免備商牛蒡前胡九節菖豆豉象貝達痰丸三分薄荷鬱金天竹黃連翹光杏靈寶如意丹三分案伏邪晚發獨熱不寒舌色乾白脈象濡數陽明之症逆傳最易葛根豆豉佛手薄荷枳實前胡桑葉光杏花檳鬱金紫金錠二分先服案寒熱已退而納食不加舌有灰色小溲混濁餘邪未清也豆卷法半夏赤白芍煅牡蠣滑石生熟穀芽丹參秦艽方通草陳廣皮淮麥案寒熱既系外邪何得脈反左大良由勞碌濕滯朋比則氣分不舒脈道不揚也上川朴秦艽桑葉枝豆豉前胡藿香梗花檳滑石枳殼實半夏蘇葉保和丸案痢數雖減而又咳熱喻氏逆挽法本因先熱後痢而設痢仍未止擬假其挽逆之力以望轉機否恐慢驚接踵耳南沙參羌獨活柴前胡赤芍炭赤苓皮大撫芎薄荷枳實炭槐花炭紅神麯香連丸八分回春丸二粒楂炭案因瘧強截內傷脾土熱蘊膚浮色黃濕熱內戀恐其入損青蒿桑葉枝淡芩豆卷滑石赤苓通草採藝曲秦艽花粉萆薢案症勢稍減經仍未行舌裂未滿總屬損怯根萌全當歸赤白芍桂枝三分同炒白薇桑葉枝黑豆衣玫瑰花粉丹皮茺蔚子秦艽柴胡功勞葉香附丸逍遙丸案每至黎明即覺脘阻逆脹且尚噦惡是肝與胃氣火上熾也半夏淡芩川雅連黑山梔橘葉藿梗香附連皮檳陳皮沉香摩沖案瘧意未清勞力引發以致膚色黃浮小有寒熱也柴胡川朴川斷草果仁金狗脊滑石秦艽苓皮枳殼冬瓜皮桑葉枝牛膝案此次天癸堪差如舊痛亦迅減誠美事也如能逐日向安則天上玉麟豈云不到人間也全當歸小茴香五分同炒延胡桂木制香附赤白芍寧坤丸一粒五靈脂川芎砂仁月季花臺烏藥案瘧久不食面色黃浮是濁邪留戀於脾胃也制茅朮川朴青蒿豆豉秦艽竹茹冬瓜皮香附枳殼桑葉苓皮滑石案舌光多裂陰分虛也陰虛則不斂陽而心煩不寐南沙參枳殼茯苓神首烏藤棗仁炭焦於術焦秫米法半夏新會皮桑葉枝合歡皮案涼營化濕血淋已減白濁未止痛必有火脈沉尺大古人治法不外痛為不通病日已久當參脾胃經旨所謂中氣不足溲便為變是也小薊炭生白朮碧玉散澤瀉威喜丸錢半鮮南沙參川萆薢海金砂豬白苓黑山梔二妙丸炒白扁豆案今雖胸脅腹痛得減然咳嗆氣逆不平臍上按硬手不可近喉間痰聲宛如拽鋸舌苔淡黃而干滿布黴黑斑點此係邪積化熱蒸濁成痰痰生於胃而貯於肺肺胃本降而反升矣如蒙入膻中則昏閉可立而待擬方候商生山梔橘紅絡桑皮牛蒡象貝竹茹前胡連翹紫菀鎊犀尖枳實葶藶茅根薄荷礞石滾痰丸三錢案先為胃痛近又寒熱嘔惡汗少脈滑而數當從少陽厥陰疏和青皮桑葉蘇葉摩花檳三分炒枳實雷丸鶴蝨豆豉川朴淡吳萸雅連三分同炒使君子案壯年遺泄不為急務又因咳嗽食少是濁痰內阻由胃及肺為之嗽也且從此立方蘇子白朮象貝製半夏潼沙苑橘紅桑皮前胡牡蠣白茯苓檀穀芽桑枝案血轉紫殷較前似減肝脾似有統藏之意從前法出入投之西黨參於術槐米樗白皮芡實陳阿膠大有耆防風炒白芍牡蠣石榴皮藕節案血輕復重陰絡受傷童子當此舍栽培後天一法別無他求大生地白芍於術訶子樗白皮藕節西潞黨槐米上耆牡蠣十灰丸案獨熱不寒病在陽明逆傳心胞則易昏厥擬梔豉湯加減黑山梔象貝鬱金枳殼實牛蒡子川朴淡酒芩豆豉薄荷苦桔梗滑石塊菖蒲案寒熱已退腹痛亦減然日昨之勢有似破竹今日之象形似大兵家恐詐病家慮伏古人云知己知彼百戰百勝能從此參之思過半矣豆卷秦艽山楂枳殼實青皮片木香導滯丸神麯花檳佛手嫩前胡方通草香砂枳實丸案病緒多端本病則氣鬱血虛標病則寒濁為多且用逍遙化氣成方然不若安養怡情為上策耳上川朴香附烏藥前胡金沸草沉香四分桂枝蘇子光杏橘紅廣鬱金八分案病癲無有不傳心肝豈能免其痰火火之性上炎痰之性瀰漫癲之所以作也當歸龍薈丸二錢通便清氣化痰丸錢半滌痰硃砂安神丸錢半安神案頭搖目竄兩脈似絲便泄五次哭聲呀呀脾元大傷恐猝然風動厥脫老臺參鬚煨木香茯苓神煨天麻川貝母土炒於術淮山藥白蒺藜煨訶子回春丸案瘧痢並行經腑同病仍屬伏邪濕熱積滯互相為患暫假喻氏逆挽法望其熱退痢止方免慢驚羌獨活神麯柴胡赤苓撫芎前胡枳殼苦桔梗薄荷楂炭摩木香五分摩花檳五分二味沖案截瘧早止致為力乏熱戀不惟邪濕未清抑且積勞而發也青蒿萆薢豆卷桑葉枝全蘇滑石茯神川朴淡芩左秦艽方通蠶沙案瘧象略減然熱退未清力不能復前法佐以泄化方合病機香青蒿左秦艽白蒺藜採藝曲連皮檳菊花淡豆豉川萆薢蠶沙淡酒芩桑葉枝川朴案丹溪云上升之氣皆出於肝肝固宜升升過則肺胃不降矣金沸草橘紅絡鬱金大腹皮合歡花摩沉香川楝子白芍香櫞砂仁殼檀穀芽蘇羅子摩案瘧久不退遍體萎黃邪與濕滯一無出路恐藥不足恃上川朴豆豉陳皮萆薢通草連皮檳秦艽淡芩滑石全蘇茵陳炒桑枝案濕熱交蒸痰氣穢臭苔溲俱黃乃肺癰之萌芽生苡仁緑豆衣大貝母滑石方通海浮石生扁豆光杏仁甜葶藶桑皮赤苓海金砂案似瘧加咳兩感於邪所致一在足少陽一在手太陰且先合治柴前胡桑葉枝光杏橘紅秦艽法半夏蘇子葉上川朴豆豉象貝牛蒡酒芩案脘腹撑脹痞痛脈沉屬氣鬱濁聚女子以肝為先天胃宜下降且以溫通疏達陳香櫞香附沉香曲摩木香生熟苡仁帶皮檳吳萸檀穀芽摩烏藥菖蒲青陳皮案瘧痢兩月形消肉脫邪積交阻藥焉能恃勉方以望轉機萬於一也南沙參青蒿楂肉神麯白芍吳萸炒於術赤苓當歸炭砂仁另陳松花三分煨木香五分五穀蟲五分炒澤瀉五分火腿骨七分五味共研末粥糊為丸案咳不離乎肺非外感即內傷為日已久邇來加甚脈浮而滑痰色帶紫想風邪久蘊化熱蒸痰再從肺胃清泄麻黃前胡半夏生石膏橘紅冬瓜子光杏象貝桑葉牛蒡子薄荷案胃氣夾濁脘痞嘔惡為日已久恐成反胃公丁香延胡代赭石苓皮前胡廣藿香橘紅金沸草半夏上川朴枳實蔻仁溫化丸二錢案恙延兩月有餘寒熱無序近覺大腹膨脹舌苔黃膩乃少陽之邪併入陽明脾氣失於健運也製半夏豆豉草果皮淡芩川通草冬桑葉連皮檳川朴江枳實滁菊香青蒿溫化丸案咳血有年近加音啞內熱是邪熱逼肺肺氣大傷也元參三錢象貝三錢生山梔三錢生石膏七錢鮮薄荷一錢桔梗一錢射干一錢知母錢半竹茹錢半全蟬衣一錢鎊犀尖五分淡芩錢半案痢成休息脈數內熱咳嗽痰白得汗不暢是濕熱不化復感新風也煨葛根炒防風茯苓枳實橘紅木香川雅連制川朴前胡槐米砂仁花檳案寒熱已輕咳嗽不平痰色已濃舌苔黃膩濁邪不化肺失通降之權也金沸草生石膏前胡桑葉赭石淡芩竹茹冬瓜子馬兜鈴象貝薄荷橘紅紫菀案內熱漸退咳嗽不減音啞氣逆痰色濃白是邪熱灼肺肺陰已傷本宜清養無如近加腹痛便泄是腸有停積脾運少權也射干連翹蟬衣玉泉散桔梗煨木香牛蒡前胡枳實連皮檳竹茹木香導滯丸二錢案寒熱雖退胃濁未清胃為六腑以通為主川朴鬱金半夏制軍後下花檳尖枳實香附桑枝淡芩草果仁摩烏藥摩鬱金各四分案寒雖陳作熱退不清汗出遍體咳嗽痰白面有浮意兩足亦腫邪蘊不達脾傷不運肺感新風合而為病也金沸草川朴枳殼冬瓜皮粉前胡豬苓草果皮桑葉牛蒡老桂木薄橘紅苓皮案歸柴已退寒熱內虛可知腹中常覺不和氣血並病仍從損門出入當歸香附茺蔚子砂仁桑葉枝花檳丹皮延胡五靈脂青蒿寧坤丸一粒案咳嗽多年近覺哽噎脘部作痛嘔惡便泄寒邪夾濁交阻肝胃防其成噎金沸草前胡半夏橘紅控涎丹三分杜蘇子苦葶藶鬱金木香蔻仁乾薑枳實杵頭粳三錢案去夏瘧後脘左結成一癖攻撑氣逆甚則咳嗆舌黃便艱是寒濁阻氣氣痹血瘀升降不利也炒乾薑大豆卷沒藥香附枳實溫化丸二錢延胡索制茅朮陳皮草果花檳檳榔丸二錢案營虧未復復聚濁邪以致先為左肩膊不利近又脈數內熱苔黃納少也丹參淡芩半夏川雅連乾薑同炒豆卷穭豆衣川斷茯神蘇葉桑葉枝竹茹金狗脊案痘案初診第四朝地角稠密又起麟坐色雖明潤而太嬌嫩咳嗽作嗆穀食不多乃心脾之毒火太甚身中之氣血為其壅痹不得流利一周乳子當此恐其漿汁不充為半途而廢擬方備商西洋參錢半制殭蠶三錢丹皮錢半楂炭三錢大有耆三錢大生地三錢川芎五分前胡一錢紅花二分羚羊角八分杭白芍錢半歸身錢半桔梗四分紫花錢半三尖湯代水二診第七朝莫言地角麟坐擦靨愈大即背部陽躋現已擦損漿汁甚清皆由氣血兩虧毒火太甚不得外越成漿反有內陷之勢所以煩懊不定咳嗽音啞不思穀食大便溏泄諸款畢集也變端在爾將奈之何醫者之力草木之功難以挽回若得神功默佑或可斡旋元吉勉方備商西洋參一錢白桔梗四分白朮錢半川貝錢半制殭蠶錢半竹茹錢半生甘草二分炙甲末三分白芍錢半茯苓三錢楂炭二錢燈心三分另上西黃二釐人中黃一分五釐青果炭一分三味研末三診第八朝若論擦靨已有六七所有未靨之花不過三四漿汁雖濃然粒數無多不足以泄其毒火幸而飲食覺增便數大減脾胃漸得生機胃者衛也脾者榮也若得榮衛先足內則保護宮城外能逐毒表分從空而化或有望焉候商北沙參三錢白芍錢半生甘草二分大天冬錢半炒白朮錢半炒淮藥三錢雲茯苓三錢扁豆三錢白桔梗八分淡竹葉十片辰燈心三分清米湯代水另上犀黃二釐上濂珠半分西血珀一分五釐人中黃一分五釐同研細末服四診第九朝頭頂背部漿汁漸濃然胸腹猶屬空殼清汁咳嗽噦嗆咬牙音啞乃毒火內熾充斥上下未能盡歸花囊也尚有擦靨之險備商生熟地各三錢西黨參三錢白朮錢半歸身一錢楂炭二錢元參一錢肉果八分大有耆三錢杭白芍錢半象貝錢半制殭蠶三錢竹茹五分炙甲末三分檀穀芽四錢煎湯代水另上犀黃二釐人中黃一分五釐川貝母一分五釐研末服五診十一朝瘡至結痂元氣大傷其倦怠嗜臥似乎合理但自早至暮通宵達旦竟無片刻舉動此為太過至於不欲吸乳但能食粥良由鼻孔窒塞轉氣不能故耳論其脈象舌苔內蘊之毒火尚熾毒雖緩而火最迅速易生反復不得不預告之抑不得不預防之候商南沙參人中黃川斛茯苓象貝竹茹葉大麥冬淮山藥扁豆澤瀉竹心緑豆煎湯代水六診十二朝神識頗安似乎倦怠幸而稍動即覺呼之即知從正氣衰憊而論原屬正理惟仍不食乳粥食減昨乃脾胃不運生氣不振細以脈舌合參現已成痂脫疕毒火諒可外越想無內竄之理法當清解之中兼以扶正北沙參人中黃扁豆地丁燈心桔梗大麥冬淡竹葉元參象貝茯苓川斛生熟穀芽上西黃青果炭二味同研末服緑豆湯代水案足兩朝心肺二經之痘重候色紫不鮮神識糊迷咳嗽身熱風溫引動伏毒刻下見點未齊且先解肌透達羚羊角鮮地紫草連翹石菖蟬衣薄荷摩犀角丹皮橘紅桔梗牛蒡象貝三尖湯代水案第十朝漿汁較昨雖濃而多但下體仍然空殼漿清咳嗆食少氣短似喘頭震咬牙大便不實乃氣虛不能托毒血虛不能養木風動火熾掣提於上充斥肺胃也恐其驚厥之變備商生熟地各三錢歸身一錢制殭蠶三錢白芍二錢象貝三錢肉果一錢楂炭三錢人參鬚四分黨參三錢白朮錢半黃耆三錢炙草四分竹茹一錢生熟穀芽四錢煎湯代水案第九朝花已靨之八九疕紫而厚氣血猶可毒火未能盡泄本宜清解為法但從透至今咳嗽不平當此立方為主冬瓜子牛蒡子杏仁橘紅地丁草淡竹葉馬兜鈴桑白皮薄荷前胡象貝母金沸草案身熱三日花透一朝且用清氣解表法荊芥蟬衣紫草赤芍藥楂炭牛蒡筍尖三個連翹丹皮桔梗鎊犀尖薄荷橘紅案初診自熱五日花見朝半咳嗽噴嚏煩懊噦惡點來細小稠密又犯托腮忌款形滯色紫腹硬不便此痘至肝肺毒火本甚而又外感時令之風邪內挾有形之痰滯體小花繁恐其無力托載以致行漿費手擬方候商鎊犀尖四分先煎桃仁泥三錢紫草錢半赤芍錢半桔梗五分連翹三錢橘紅五分廣生軍三錢後入粉丹皮錢半薄荷錢半歸尾錢半牛蒡三錢三尖湯代水二診兩朝半痘犯托腮已屬不順足底未見勢當未齊形色較昨雖從耳而轉淡然大便未行咳嗽煩懊肝經之風邪陽明之積滯與內蘊之毒火充斥營衛不得宣越也當此重險之花雖略奏小效無如五齡童兒任性堅執不但不肯服藥抑且衣被不能著蓋恐其內不得藥力之助外不能調護邇適宜致生變幻姑再精選至要之品不苦易服之味仿兵在精而不在多之義候商鮮生地五錢羚羊角一錢桔梗五分紫草一錢三尖湯代水三診四朝半大便雖行三次溏而不多肝肺之毒火稍得下泄之機而不能挫其猖狂之勢所以點雖從耳抬髮際漿腳已動似屬寒谷春回詎意天庭擦去一處酒杯大兩腿上面亦屬揉損咳嗽乾噦燔熱不退乃先天之梟毒胎中之伏火充斥於內擾亂榮衛衛者陽氣榮者陰血花中最吃緊者莫重於漿漿乃毒火所成而毒火全賴乎氣血之消解氣血既為毒火沖激擾亂自顧不暇焉能托毒火歸囊成漿若別處再見損殘則狂瀾莫挽矣候商西洋參錢半大有耆三錢生石膏五錢制殭蠶三錢桔梗五分中原地三錢鮮生地五錢大白芍二錢穀芽三錢三尖湯代水四診五朝半大便暢行穀食稍增似轉一線生機但天庭地角眉間顴腮無處不損損固不為善苟能堆沙發臭毒火原可外泄而今結成血蓋行漿無望矣而以身體四肢視火漸淡漿甫起得食則咳咳則作嗆毒火膠固不松氣血難以駕馭樹小枝繁乏力支任八九之險浪風波難免矣擬方候商西黨參三錢西洋參錢半杭白芍錢半角針一錢楂炭三錢大有耆四錢西歸身錢半炙甘草五分元參二錢制殭蠶三錢大生地五錢鮮石斛四錢生穀芽三錢三尖湯代水汪藝香先生醫案案初診一熱則驚其故者何蓋緣邪積極甚充塞於內閉而生風也驚後四肢反冷熱熾於內可知舌苔黃厚脈象數實症之險重何辭歷考古人治法都以涼膈散泄其無形之熱去其有形之積為主然陽氣能宣不閉能行不冷由此而論治氣亦為緊著必得腑通表達庶可截其駕輕就熟之路或可不踏前轍為妙是否商進淡豆豉三錢薄荷一錢鮮佛手錢半牛蒡子三錢鉤鉤尖四錢後入黑山梔三錢連翹三錢廣鬱金二錢粉前胡錢半達痰丸二錢入煎包大還丹二分待熱甚服二診進涼膈散腑氣雖未流通無形之熱氣已泄譫語稍平煩躁亦止熱衰十八苔化大半能於明日如是方為邪敗之象出入前議以冀霍然大豆卷三錢黑山梔三錢全瓜蔞四錢前胡佛手薄荷各一錢半滑石塊六錢焦枳實錢半鬱金牛蒡荷梗竹瀝達痰丸一錢案初診症延十有六日寒來不過四肢身熱起伏咳微不爽從未得汗脈來浮滑而數舌質光紅而干前日陡加煩躁竟無片刻可安的是伏邪歸入陽明鬱蒸化熱陽明本是多氣多血之鄉經中氣血既為邪熱煎沸變為多煩多躁之地蓋胃上覆肺迫近心包此處既為邪熱所交迫無怪其勢益甚焉如再進一層則不堪設想矣姑擬白虎湯一法救肺之品亦寓其中矣生石膏八錢生山梔三錢天冬三錢茯神三錢夜交藤三錢阿膠三錢肥知母三錢玄參三錢淡芩錢半生炙草各五分百合心五錢二診煩躁又輕於前今日脈象不靜腹痛時作臍下膨滿舌苔黃而膩中心一條光裂乃濕溫化熱分而後合熱則陰分受灼久則木橫乘土脾胃雖皆屬土大腹乃脾土所主養陰泄熱抑木和土乃一定章程川連四分大豆卷三錢北沙參三錢煨木香七分白芍錢半茯苓神各二錢淡黃芩錢半冬桑葉錢半白石英二錢大腹皮三錢香附三錢臺烏藥錢半杜竹茹錢半戊己丸一錢三診大便數行似可推陳致新刻下不但腹痛未除而臍上更且發熱而兼身熱舌心光裂今布淡黃此無他定由陽明之宿垢未楚太陰又招新風風為無形之邪首必襲肺肺令人咳咳甚則身熱耳還慮驚喘之變荊芥枳殼桔梗蟬衣橘紅桑葉前胡象貝竹茹蘇子牛蒡神麯四診病中加咳既非本病實由新感所致雖未起床出幃而虛則衣被之間亦可冒風風性鼓蕩為百病之長所以陡加咳嗽身熱復甚非散不可非汗不解且不宜緩正所謂無糧之師利於速戰耳南沙參麻黃荊芥象貝鬱金橘紅牛蒡子前胡桔梗光杏仁枳殼竹茹案初診疸瘧之濁邪本未盡徹復因感寒與素有之肝氣併發犯胃侮脾無所不為是以陡為上嘔下泄寒熱腹痛不一而至也恙後久虛恐其不支而變廣藿香川朴烏藥淡吳萸制廣軍新會皮蘇梗香附枳實連皮檳白蔻仁另上瑤桂一分上沉香二分巴豆殼二分生黑醜二分研末先服二診經曰用藥如用兵應戰則戰昨日宛如敵寇圍集勢不可緩非大將長驅攻伐焉能攻出重圍必待敵人不得奔散方可直走坦道病勢自然告退但餘氣尚甚宜肅清為妥製半夏藿梗淡吳萸香附連皮檳摩沉香沖煨木香廣皮煨草果枳實制廣軍三診熱勢雖和腹痛不已連及腰脅欲圊不便舌色灰黃乃濁滯內阻氣遂窒痹迫入於橫絡之間也肝性剽悍恐其肆橫無制為暴厥之變候商青皮香附乳香草果仁連皮檳橘皮延胡川朴木香淡吳萸上沉香枳實備急丸二分溫化丸二錢二味和先服四診經云藥與病竟如對待寒宜溫食宜消窒滯宜通此是寒滯阻氣阻痹不便以溫化通三法並行得暢便數次宿垢頓下庶能腹痛大減黃苔半化脈象宣揚正是陽明主腑以通為用況今氣道雖曰無論虛實皆貴乎通暢而在實面尤甚昔賢早已定例刻下余濁未楚氣機未宣還宜疏化毋用通劑制茅朮川朴烏藥枳實香附半夏木香連皮檳制軍陳皮小茴摩沉香三分摩青皮四分沖案初診邪痧一候遍體色紅如塗胭脂邪熱分泄但點粒不清面部色淡未足咳痰不爽煩躁神糊滿口碎腐汗瀉不暢脘腹板硬而痛大便溏泄不實脈濡滑數舌尖布刺乃邪不外達積難下化化熱蒸痰由肺胃而下趨大腸也泄則傷氣恐無力托載邪從內走為昏閉之變黑山梔豆豉連翹淡芩廣生軍前胡天竺黃木香枳實連皮檳鮮薄荷川雅連桔梗蘆根摩犀尖萬氏清心丸二診熱雖得和神識仍糊皆由邪不外達積難下化之故蓋痧症即是時邪邪與積蒸化熱煉痰蒙灼於肺胃肺胃居於中土在於胸膈之間夫胸中本是清曠之地氣機所聚之處今為熱邪痰積僭居機竅失靈神明逆亂所以語言無序苔浮起腐咳痰不爽脘腹板痛諸恙不退也為勢尚在險途恐有非常之變生石膏黑山梔前胡射干淡芩天竺黃鮮蘆根生廣軍連翹牛蒡桔梗膽星鮮薄荷另上濂珠三分西黃三釐川貝三分同研末和入摩犀尖三分三診便雖兩行俱屬不暢有形之痰積仍與無形之邪火相蒸於表裡充斥於上下無怪其壯熱煩悶咳嗽不爽喉間痰聲宛如拽鋸口唇舌色竟如豬肝滿口腐爛神糊目赤脘腹按之板痛脈形沉濡滑數諸款畢集也刻下一葉小舟行於萬頃波濤之中險莫甚焉回思既業醫者何思束手望視不得不曲運神思搜索枯腸勉擬一方乞得神功默佑或可有弋獲之幸玄參象貝連翹生石膏前胡廣生軍四錢梨汁浸打汁沖先服牛蒡知母竹黃鮮生地豆豉同打枳實風化硝錢半沖鮮薄荷鮮蘆根白茅根摩犀尖沖案經云夏傷於暑秋必成瘧瘧不離乎膽者猶咳不離肺也蓋咳有聲音瘧有寒熱故也是瘧已延兩候有餘始起似有間日輕重之象寒總不能栗熱不退清陽明之病兼涉少陽不曰似瘧名之起伏起伏之由病居募原之間相隨衛氣而發古云暑必挾濕傷人氣分所以作則煩悶嘔惡非常難過必然並見刻下苔色黃而膩脈象濡數不持胸次痞窒甚則覺痛形似間日之瘧實則為起伏耳懷孕八月手陽明司胎大腸與肺相為表裡胎為熱迫其氣乃逆逆則猶可竊恐胎動下墜耳總之暑為熱氣胎宜涼安用藥從此著筆佐以芳香化濁苟能應手方可把握然否商進豆豉桂枝尖知母連皮檳川朴淡子芩草果鮮佛手滑石鮮蘆根鮮荷葉摩近根蘇梗三分摩老山檀香三分沖二診間日起伏邪在衛分汗多不解濕蒸故也舌苔淡黃而膩胸次痞窒而間暑濕之病陽明之症昭如繪素矣有娠病久其元自虛純補有礙於邪濕獨散猶慮其傷正法當兼顧以望各有裨益南沙參香豉淡子芩連皮檳香青蒿川朴草果仁上紫蔻鮮佛手鮮薄荷辰滑石冬桑葉案寒熱下痢而致胎墮張氏云五日不止者不治古人之言良不詒我當歸頭撫芩荊芥紅神麯橘紅枇杷葉澤蘭澤瀉楂炭鬱金粉前胡枳殼赤砂糖西血珀四分煨木香四分同研末先服案夏邪秋髮謂之伏邪伏邪二字邪根深蘊可知況今歲甫交夏天即暴熱吳氏所謂時未至而氣先至此謂太過人處其間壯者猶可運行怯者從此感受至秋風而成病病來寒熱無序起伏不一汗不遍體噦惡便難胸悶煩懊通宵達旦無一刻可安之勢從脘至腹按之板痛乃積膈腸胃之徵脈來滑數而渾舌苔膩而心絳者陰分素虧陽邪獨發夾積阻氣蒸濁成痰內擾肺胃上迫膻中年雖不過五外而早已未病先虛當此之證不但用藥殊難更卜其易生變幻姑擬一方若得如合其意或有見長之地則更妙矣半夏淡芩廣生軍藿梗鎊犀尖桑葉竹茹豆豉雅連枳殼實薑仁白茅根茯神另西牛黃二釐濂珠二分九節菖三分生黑醜三分同研末先服二診熱勢輕劇無序即謂之起伏他症無起伏惟伏邪能起伏者須從伏字著想蓋伏即進起即出能進者能出人身之氣道晝夜運行循環不息晝夜行二十五度以分陰陽今因伏暑內蘊邪與衛氣並居雖不能阻其往來之道路而必隨衛氣以出入至其所發過其所伏若論輕重長短視其邪之多寡正氣之強弱其中夾他病須隨症參切此症素體陰虛今為隔食阻氣氣有餘即為火昨用大黃黃連法復入清泄氣分便已數行腹硬得減脈仍滑而帶數舌轉花淡黃而露底望之質乾紅刺密布良是滯積下而未清胃中之津液傷有限之陰液難勝無情之邪熱至於熱起之時時候常早似難捉摸外來之病猶如盜賊逐去即安當此大戰之際對敵之寇若得散而不聚應無猖獗之勢矣擬方高明商進鮮生地黑山梔粉丹皮石斛茅根瓜蔞仁連翹枳殼實玄參竹茹摩犀尖二分摩花檳四分二味沖服案上吐下瀉名曰霍亂霍亂者霍然而亂之謂也病有真偽之別真者勢不可當險如朝露偽者不過寒積交阻中宮格拒此症固然非真上不得納便行如水而今四日指臂不溫脈來沉濡而滑舌苔淡黃而膩乃寒積夾濕交阻中宮升降失度水穀不分煙體當此近則恐其閉脫遠則防轉為痢姑用芳開天氣溫通地道一法擬方候商香薷一錢木香六分烏藥三錢法半夏三錢枳殼實三錢藿梗三錢紫朴八分帶皮花檳三錢橘皮一錢紫豆蔻六分桂枝尖三分溫化丸三錢桑枝四錢案年已古稀之外氣液無有不虛病患暑濕竟成疸瘧今已十有二日熱勢雖衰尚未退清脈象小數舌色光紅有時神識不清口渴頗喜得飲濕因液虧而化暑由氣虛尚逗大凡暑病之不寒獨熱者陽明病也經所謂陰氣先傷陽氣獨發良有以耳刻下虛多於實正負於邪古法本有扶正達邪之治胃氣不振托邪難盡胃陰不復飲食艱進竊恐病去元敗臨崖勒馬收韁而有不及之嘆姑仿先賢兩虛一實之例然否鮮南沙參五錢川貝母一錢益元散四錢方通草五分香粳稻葉三十片肥知母錢半鮮荷梗二尺佛手露一兩金叉石斛三錢大豆卷三錢新會白五分佩蘭露一兩連翹心三錢元參心三錢蘆根一兩竹茹五錢案初診夫暑為天之氣濕為地之氣天之暑氣一動地之濕氣隨之人在氣交之中觸目口鼻內伏而發秋涼引激病於少陽則為瘧即內經所謂瘧不離膽是也病於陽明則寒不能栗熱不退清雖亦名瘧然必嘔噦胸痞煩悶是症今五日矣見象大概如是而以脈象參之左部見弦右手濡數弦則必有轉瘧之勢濡則仍居於胃胃為中土又為坤地地氣上騰天氣不肅猶如隆冬之雲霧迷空日光被蔽胸中清曠之地宛如煙塵之處煩躁難過夜不安寐勢當然耳刻交成敗之際正勝則邪達似可日增康境邪勝則正負必至內陷神昏扶正本非其時達邪誠為要事古云急者先治旨哉斯言但暑居濕下清之徒然濕遏熱上開泄為主治以苦辛使其氣之升降溫芳闢其濕之瀰漫輕淡宣其蘊伏希能應手而效尚屬立陳布兵之時何能一鼓掃蕩如邪勢折挫能免變幻幸矣備方商進香豆豉三錢上川朴八分苦桔梗一錢桑葉檀屑三分全紫蘇三錢上紫蔻五分光杏仁三錢闢瘟丹三分熱甚時服廣藿香三錢生香附三錢滑石塊四錢九節菖廣鬱金各三分研末服二診經曰暑傷氣濕亦傷氣氣能開合邪隨開而為起合而為伏前日之起伏者即氣為暑濕所傷開合失其常度故也煩悶為肺氣之合膚冷為脾氣之合不便為腸氣之合是以桔梗以開肺檀附以開脾藿朴以開胃郁菖以開痹花檳專流於下焦之氣阻豉滑以蕩胸中氣熱蘇蔻以祛濕中之穢氣而今氣開未全暑濕未清以致症象雖減不能大解也仍處昏蒙之險再當擴充前方上川朴枳殼鮮佛手藿梗生香附炒香櫞連皮檳光杏仁九節菖桑葉上紫菀竹瀝滾痰丸案今歲甫交夏至即為大熱吳氏所謂時未至而氣先至乃太過之謂也人處其間壯者猶可運行怯者著而成病病恰半月熱仍夜盛煩悶乾噦脘板而痛遍體透斑斑色紅紫固是正理兼晦澀不澤者誠非佳兆脈來濡滑而數舌苔淡黃而垢熱由氣膠錮不化之時姑用大黃黃連瀉心合犀角大青之法蓋斑與疹㾦不同斑宜清化古人早已示後原可一例而治未識符否備商半夏川雅連淡芩廣鬱金光杏仁白茅根黑山梔鎊犀角桔梗薄荷頭廣生軍杜竹茹案六淫即謂之六邪惟暑濕二字每都連呼者良由天之暑氣動地之濕氣自騰人處其間氣強壯者自可運行泄化氣怯弱者未免著而成病病經一旬熱勢雖為大戢而退之不清脈來濡滑而數舌苔積白如粉自汗溱溱暑可從此而泄濕仍留戀中土且素來心力紛勞肺之液胃之津不但不得上供未免因病益傷也姑用十味香薷飲出入香薷川朴陳皮川雅連乾薑二分同炒丹皮歸身茯苓滑石江枳實杜竹茹案初診夏病秋痢雖屬趲季為痢然有其病者必有其因抑且今歲天符熱早雖非夏行秋令其氣先至顯然人為一小天地豈不隨時更變此症今恰半月開手即痢日夜竟有五六十度裡急後重紅白相兼穀食宛如登仙大腹竟似仰瓦口舌滿布糜腐幸而脈濡沉細想其腸胃中之積滯早已隨痢而去瀰漫之濕熱現被胃火充斥升降失度上衝則為腐為厄下攻則為痢為泄較之陰火為腐者似輕一層但年近花甲症情已屬上為實熱下為虛寒上下宛如冰炭用藥之難何待言者擬用連理湯出入應如桴鼓或可斡旋元吉候用東西洋參各一錢同粳米炒雅連三分東壁土炒茯苓四錢橘白八分鮮竹茹錢半薑汁炒生炙甘草各二分炮薑三分扁豆三錢炒砂仁三分駐車丸二錢另服炒於白朮各錢半訶子一錢麵裹煨白芍三錢黃芩一錢陳倉米三錢鮮荷葉色刺孔煎湯代水二診大便直行謂瀉溏水細屑為泄膠膿黏膩為痢此三者似分而實合也其間有臟腑之別淺深之分蓋瀉從腸胃而來泄由太陰而起至於痢之一症雖則臟腑皆有而實腑少臟多大腸為腑因其隸屬庚金金旺於秋痢為秋病故以大腸為下痢之主症也若論臟痢肝脾腎三經皆有腑淺臟深輕重有分此症開手即痢諸款畢集前進連理湯兩劑不但圊數大減且有轉泄態勢即穀食亦可稍進似屬佳徵惟厄忒不平喉腐未退良以由肺胃宜降而返逆所蘊之熱濁無不隨氣上衝如七日不減就有非常之變不得不預告知抑不得不預防之擬方候商釘頭赭石煅三錢紫石英四錢於白朮各錢半東西洋參各二錢刀豆子三錢法半夏三錢煨訶子肉二錢旋覆花二錢包雲茯苓三錢雅連二分白芍炒三錢橘皮八分竹茹一錢另上沉香二分公丁香一分大砂仁半分西血珀三分四味同研末服三診夏病秋痢晝夜無度竟然口腐厄忒穀粒不納已屬危險之至不堪設想矣幸而素不嗜煙為日不久腐不滿口厄不連聲是暑邪蘊於陽明濕滯阻於太陰運化少權和降失司而成尚屬從實面而來猶可挽回即用連理湯兩劑庶得圊數大減噦惡得止稍進穀食口腐漸脫雖屬佳徵然延至今日為勢只有輕減之意而無告退之期多延一日則元氣傷殘一日直至土頽胃爛則去生遠矣擬方備商西洋參茯苓淮藥橘白公丁香竹茹於白朮白芍石斛雅連白扁豆紋銀懸煎半分柿蒂紫石英案夏令穢濕痹氣觸自口鼻曰痧當時針刮皆由散而不清遂致似病非病者兩月其間食物必雜至今變為寒熱熱有起伏寒無定時舌苔淡黃而厚脈象濡數右大腹痛板硬便泄似痢膩噦惡汗少頭脹先寒熱而後泄者古謂經邪入腑屬不順而逆夫經者陽明之表腑者腸胃之裡胃為六腑之冠腸為傳導之首胃病則熱腸病則寒陽明半表半裡其名募原募原為病寒熱不分吳氏有達原飲一法喻氏設逆流挽舟一法羅氏參黃敗毒一法刻下經邪未達府積未通為瘧為痢皆屬易易年適花甲如不早為驅逐必致近則內閉外脫遠則噤口昏陷三子之法從中去取而治必期應手方為轉機即請有道政之羌獨活各八分柴胡四分前胡錢半木香五分佛手二錢上川朴七分摩花檳七分沖薄荷一分藿梗二尺枳殼炭一錢摩青皮五分沖豆豉三錢生熟砂仁各四分打後入案胎前久瘧産後未止忌象疊見藥焉能挽勉強擬一方以盡人謀東西洋參各一錢五分粳米炒茯苓三錢煨肉果一錢上上於術錢半澤瀉二錢煨訶子一錢土炒白芍二錢木香煨五錢炙五味二分毛燕窩錢半香稻葉生穀芽一兩荷葉包刺孔案初診暮秋至今天晴不雨燥氣流行人處其間感而受病無有不襲肺蓋西方生燥在時為秋在人為肺一定之理所以先為咳嗽身熱汗泄不暢痰白不濃且不安易出煩躁狂起神糊亂語脘腹板硬而痛大便溏泄不實脈來浮滑而數舌乾白而底絳此風溫化燥濁未成痰與積交蒸傷陰爍液肺胃迫近心包如再進一步則不堪設想矣症經十有一日本在波濤洶湧之際抑恐狂瀾莫挽矣擬方候商麻黃光杏仁生石膏薄荷前胡天竺黃牛蒡梗竹茹枳殼實檳榔丸連翹茅根玄參二診夾有時邪治必散解古人早已立論蓋風溫口鼻而入須從毫竅而出所出者汗也積是穀食而成定由糟粕而下所下者便也前進麻杏甘膏湯復入檳榔丸一法得汗透㾦且已大便表裡似已通暢邪積應可分化無如既成時症大病非一汗透痦便行一次即可解散所以勢雖稍和口渴舌乾臍上依然板痛咳痰猶然不爽脈滑而數重按少靜乃所存之邪積仍然化熱蒸痰傷陰爍液當此兩候末期而正在進退之際抑且邪積半留半化之時若論其變尚易易須得小心防護始能挽入佳境再擬涼膈散出入以冀里通表達豆豉連翹廣生軍薄荷前胡鮮石斛黑山梔淡芩連皮檳桔梗枳實白茅根案冬令正病皆是傷寒今因自秋至今天符亢燥燥氣盛行肺經感受所發見症肖乎傷寒而實風溫也夫傷寒乃冬令寒邪先伏太陽繼則循次傳經延至七日經盡乃戰得汗而解而風溫一症始終在肺夾痰濁者兼涉陽明因不傳經故不外戰所以病經一句表外似達裡熱尚甚咳不揚痰如沫神糊語亂汗泄不暢當臍膨滿大便欲解不行脈來悶滑而數舌苔淡黃而膩此由風溫為濁所戀濁未成痰欲化熱而未化火互蘊肺胃而肺胃居於胸膈迫於心包心包為君主宮城城外既為熱灼神明焉得不亂抑且病前已見寒熱正氣無有不傷誠恐正不勝邪為內陷昏閉之變麻黃鬱金半夏竹黃桔梗生石膏連皮檳前胡光杏枳實薄荷橘紅牛蒡子另太乙紫金錠三分加入上西黃二釐同研和另服改方加黑山梔犀尖案經曰夏令汗出少者至秋風而為瘧瘧類有四其因非一此症不但發於冬令抑且間日而作夏邪秋髮已屬隔季為病安知交冬甫發乎邪之深蘊何待言哉夫間日瘧者其邪本不在少陽而蘊於營衛之間衛者陽氣行於脈外營者陰血行於脈內而衛氣一日一周力左升右降循環不息氣為血舟血隨氣流行其間既為伏邪所遏而不能與衛氣俱行邪亦不出故間日而作現已逾月前日尚來余濁故未掃清而營衛亦可為寒熱也蓋瘧者虐也久則傷脾脾統血統攝無權便血後發脾屬土脾病則木來乘侮以致滿腹攻撑當臍作痛脈來細澀而弦舌苔花白而底絳血見糞後仲祖謂之遠血此非大腸為病乃從肝脾而來也金匱玉函經詳注最細用黃土湯一法補少陰之火生太陰之土抑且恐溫藥性烈內有生地以益陰阿膠以養營冀其剛柔相濟火土合德統攝有權則血自歸經矣當宗其旨略為擴充熟附子炙草歸頭伏龍肝砂仁紫石英淡芩大生地白芍橘葉白粳米於術戊己丸案初診症交七日已作一候起伏太甚甚至譫語不已起坐頻頻四末乍寒乍熱脈象右小左大舌苔滿黃大便直泄伏暑夾濕夾積頗有不得外達輾轉入里之險蓋暑為無形之氣濕為瀰漫之邪同氣相求每傷人氣氣分三焦主宰在肺肺氣開展則胸中清曠之處或可不成煙霧之天心居其內方能君主有權不為暑濕所侵而致昏閉等險豆豉桔梗九節菖鮮藿香滑石鬱金上川朴枳實炭鮮薄荷囫圇蔻仁鮮佛手另天竺黃三分陳膽星二分二味研末服二診症經九日其勢本在顛風折浪之際雖昨日午後得汗熱勢外揚神識覺慧似屬邪從外越熱傳膻中之險得以稍緩然厄已三日不平厄則氣逆痰亦隨之上升肺胃本宜下降升則逆降則順逆則諸氣皆逆肺胃失其順降之職生化之權漸失如日延一日傷而益傷勢必正不勝邪而起內陷昏閉之變擬方備商川朴廣生軍豆豉陳廣皮代赭石枳殼冬桑葉半夏嫩前胡炒竹茹另上沉香一分五釐公丁香二分白蔻仁二分同研末服三診伏邪暮秋而發本屬遲遲若論愈期輕則兩候得退重則二十一天方愈此症今恰十有二日熱勢雖和尚有起伏便雖數行得汗不暢乃欲退而不愈之兆似在正理但厄仍不平神識不慧脘部板痛咳痰不爽由於無形之邪與有形之積痰互阻肺胃而難泄化夫肺胃皆欲下降今既為其所阻無怪其應降反逆清不能升濁不能降肺為乾天胃為坤地乾天坤地竟似天地之氣否而不泰清朗之處轉為塵霧之天若非開氣以徹其邪熱通地道而化其痰滯兩候不松頗有昏陷之虞候商半夏膽星枳實上雅連帶皮檳天竹黃川朴淡芩廣皮制廣軍鮮薄荷石菖根金沸草杜竹茹另金礞石二分豬牙皂半分上沉香二分春黑醜二分四味同研末服四診人無根株穀食為命無病之人七日不食則不堪下問矣抱病之人莫言一朝即二十一天不妨身體者何也蓋病則邪勢充斥臟腑為其蒙塞所有一線正氣含蓄於內俟其邪勢一退先以米飲繼以稠粥使穀食之氣接續正氣日長一日勃然蘇醒猶如春節一到草木榮華氣滿乾坤此生長自然之理也至於此症雖未全愈而已得痊所謂小瘥也惟胃氣索然杳不思食繼因服花露一杯即為便泄宛如痢然且甚裡急脈來細弱無神舌花白而底絳的系胃經氣陰俱傷脾陽衰而不運以致不飢不食不運三款疊見生長無權而欲其恢復難矣反見神識不慧兩耳不聰懶言慵事恙後見此皆非所宜姑擬培中土以進穀食開心氣以通神明冀其漸人坦道高明商進人參鬚白朮益智仁茯神遠志炭四神丸炙龜板龍骨煨訶子竹黃石葛根肉果秫米案恙延月餘始起寒熱夾痢並駕齊至延至兩旬即為分娩夫瘧與痢是秋令時病豈可萃於一身況妊娠下痢諺云井欄圈上釘銅錢其錢無有不入於井者胎之墮也似在正理然則瘧痢久延氣無不傷復又大産血分亦虧所以病至今日瘧意雖輕痢仍不止裡急雖減後重依然且甚覺熱舌苔花白底露鮮紅脈來小數無神杳不思食小溲艱澀乃邪固大半得退其既化之熱與濕渾合由胃入腸腸雖多氣多血之鄉但纏綿不解氣血早已受傷而陰與液焉得不為其燥抑恐胃液告竭竟至傾頽轉成噤口下痢則不堪下問矣再轉一法以冀斡旋元吉擬方候商東西洋參各一錢柴胡五分黃柏五分益元散四錢粉葛根錢半茯苓三錢撫芎五分方通草七分川雅連五分淡芩桔梗七分荷葉蒂四分戊己丸四分導滯丸八份縮砂仁四分打後入案經事甫淨即發伏邪陰分之虛不言而喻況邪行如水虛處則受幸而年輕氣足尚可迎敵所以熱勢夜甚汗泄不暢煩悶痞滯脘腹板痛大便難行不甚爽暢脈來郁滑而數舌乾白而心灰陽明之邪積交蒸化熱肺胃之陰液無不受其蒸爍急宜開氣達邪通腑化積不至陰傷及氣托載乏權或免昏陷兩字擬方留請有道之士商進豆豉鬱金淡芩廣生軍黑山梔連翹枳實鎊犀尖另上西黃二釐西血珀二分九節菖二分辰燈心二分同研末服案伏暑夾濕今交七日正在充斥之際適當經事下行是以神糊譫語苔加灰色脈象沉濡而數心中煩悶不已氣血並病其險何辭勉擬桂枝白虎意參入護里宣開之品未識符否明眼商進桂枝尖黑山梔鮮蘆根鬱金鮮佛手淡豆豉淡芩鮮薄荷滑石苦桔梗另上西黃二釐上西珀二分九節菖三分同研末服案起伏疸瘧夾食腹痛曾已熱閉其險可知且擬表裡雙解能於應手方不復蹈前轍商進上川連豆豉桔梗制軍連皮檳鮮佛手光杏鬱金枳殼蔻仁辰滑石冬桑葉案人之一身從口而至肛門門數有七內經載注詳細上四下三穀食入胃遊溢津氣清升濁降胃之下口曰幽門渣滓歸入大腸而為糟粕水濕走於膀胱而為小溲而今結糞已抵腸間欲下不得當用通幽湯加減水寬則舟自行也鮮生地玄參桃仁廣生軍生山梔當歸身郁李仁麻仁枳殼全栝樓梨皮龍薈丸二錢案初診陰分不足木火凌金不時吐血玩忽未治致木叩金鳴咳遂不已即此而論已足束手秋間感觸風邪邪入太陰咳劇凜熱熱勢稍減旋即氣升胸間悶脈數弦舌紅苔白而不甚厚心胸之間若有無數凝痰結聚攻劫而致於保赤丹之猛烈胸中並未得舒非痰也氣也夫肺為氣出之戶腎為納氣之源氣但出而不納將至腎氣日形空乏暫以重鎮塞責日後調攝須任高賢非庸者之所可診治也旋覆花代赭石蘇子鬱金摩沉香冬瓜子光杏仁薏米蘆根海蛤殼二診重以鎮逆氣升減退什五喉管結痹大為寬展無如呼吸之氣依然入少出多內熱雖覺退輕仍不能靜脈猶帶數勉再鎮墮以冀喘平調理功夫務再擇賢而任耳靈磁石茯苓蘇子青蛤殼代赭石白芍川貝牛膝炭款冬花廣沉香鬱金竹茹三診重鎮之劑喘退什五原意繼進理應續效豈意初投則如桴應鼓繼進如石沉海無論在肺在腎皆與中樞無涉何至食入而脘中不舒脈細數而關部帶滑舌紅咽膩苔白良以腎本虧於下肺氣壅於上胃中之痰濕為熱氣所激復注於肺致肺胃下降之權全失再從前意兼導濕熱下行冬瓜子青蘆管生苡仁赤白芍光杏仁焦枳殼廣鬱金杜竹茹炙桑皮甜葶藶案素來腎關不固癸水不足可知泄時無夢坎離失濟以致不無所養雷火上衝刑金則咳絡傷血溢病標雖則在肺而病本實由乎肝腎也此疾之發固從實風輻輳而虛體感邪邪必不甚但是隨感隨發法當培本為主稍兼函肺之品鮮生地淡芩川貝炙桑皮赭石丹皮炭浮石阿膠全栝樓決明馬兜鈴十灰丸白芍案病久其中變遷不一且就刻下而論風不潛藏則瘧神不歸舍則昏風旋於上則夢寐必飛神遊於外則譫語不定魂魄浮於軀殼之外人身宛在縹眇之間內經曰上盛則夢飛下盛則夢墮上盛者則下虛下盛者則上虛非盛也陰陽相離不相攝納也而大腹䐜脹補氣之藥似是而非蓋心血無主肝無血藏臟主既失神魂乃越古云治厥必以通然愈通則愈虛虛則恐有不省之險治痞必以鎮愈鎮則愈墜墜則恐有下脫之虞勉擬鎮熄但危險若此恐有鞭長不及之嘆陳阿膠煨天麻煅牡蠣乾地黃珍珠母雞子黃夜交藤炙龜板干河車辰茯苓白芍鐵落案經停七日邇日汗多如雨飲食減少內熱不退右脈細澀左脈弦數屢投益陰固衛之品未見所長拙見經因病而不至者非瘀也虛也汗不醒寐而出者非虛也火也既非停瘀不必以攻知是火迫不必以補古云先斷經而後身熱者為乾血先時症而後經停者為血虧蓋血屬陰陰為水類氣屬陽陽為火族火燒則水涸即所以益水滅火必籍以苦寒仿古四法之一當歸六黃丸四制香附丸案按脈中空邊實來往不利此名芤澀澀則有瘀芤則血虛胃絡震動諸經失養不可堵截且用和絡茜草炭黑豆衣茅花炭血蒺藜血餘炭丹皮炭生蘇子牛膝炭鉤鉤石決明十灰丸六味丸案懸飲入胃為痛攻撑不已漉漉有聲溫和不應當易疏通河間子和等法是也金沸草橘葉皮半夏上川朴雲茯苓枳殼實薑渣連皮檳溫化丸舟車丸香附麥芽案胸脅作痛吐血色紫瘀傷在胃胃為多氣多血之鄉亦屬通衢大道且仿古人折其上逆引其下達之法鮮生地廣生軍牛膝梢三味打汁溫熱調服另煅花蕊三分上三七三分研末同服案灑淅寒熱肖乎瘧狀實則營衛不和虛而且郁正所謂氣痹則密營虛則熱也當用逍遙散出入投之當歸草果青皮蘇梗桑葉雅連柴胡茯苓丹皮川朴摩香附沉香案風溫蘊肺咳熱並重兩感之症非輕可知肺病逆傳必至心胞脈數舌紅辛涼佐以甘寒方與春令風溫合宜射干橘紅鬱金枳殼實豆豉牛蒡象貝前胡光杏白桔梗另鮮薄荷萊蔔荸薺同打絞汁沖案大便兩行極少積滯尚未盡下脘右按之猶痛噦惡稍減汗仍未得所蘊之邪亦未外赴是以午後寒熱仍起起則煩悶更甚脈來濡數舌苔黃膩症經九日本在波濤洶湧之際其勢不劇即是退機姑觀兩候期上動靜擬方候商黑山梔制軍半夏雅連廣藿枳實鬱金豆豉竹茹紫金錠加入上西黃二釐案虛火內熱由乎肝腎而來上吐血下泄精陰虧則陽旺火熾則水涸勢所必然山川草木焉能圖其痊愈竊恐後交夏令火旺之時身中素虧陰精不足供其灼劫耳速清明見診治可也北沙參白殘花生淮藥石斛桑葉丹皮生鱉甲香青蒿川貝母扁豆料豆當歸六黃丸資生六黃丸案經曰脈來數而中止為促促為陽甚陰虛之病咳熱痰紅而見此脈推因外風入肺已經化火內熾古云水出高源源病則水必日涸凡為癆瘵者比比皆是桑葉皮地骨皮冬瓜子炙紫菀馬兜鈴炒丹皮北沙參光甜杏竹茹另青培散川貝母各三分同研末枇杷露調服案久咳見血本屬極易之事蓋咳則諸絡皆震肺絡受傷則血溢於上左脈弦數咳血所忌者有木火刑金之勢炙紫菀丹皮炭血餘炭絲瓜絡炭光甜杏海蛤殼海浮石冬瓜子炒黑竹茹另上三七五分飛青黛四分黑山梔三錢燒秋石一錢廣鬱金一錢茅花灰一錢六味為末用陳阿膠煬化為丸案風入於肺身熱咳嗽已經兩閲月矣脈數而滑舌紅而光邪不外達勢欲內傳古人有咳嗽而成勞損者此之謂耳麻黃橘紅絡鬱金生草竹茹生石膏象貝光杏仁桑葉前胡冬瓜子案大便數行俱泄如水以致喉間仍然哽窒偏左攻觸不時火升頭面脘部汗出如浴想其腸間之水濕雖下肺胃之黏痰未化鬱則肝火易迫液外泄也法半夏淡射干玄參馬勃控涎丹薄橘紅廣鬱金川貝母桔梗香附竹茹炭案過於耕作則肝脾兩傷肝傷則血衰脾傷則氣弱遍體萎黃力乏近又漸寒而熱脫力如此名曰勞傷內經之重症也當歸茵陳連皮檳橘白絡功勞葉白朮豆卷連皮苓桑葉枝五加皮左秦艽餘糧丸資生丸案寒積動蛔腹痛陳作牙齦糜爛得食痛甚是氣鬱化熱上走於絡也痛甚恐變驚厥川雅連摩花檳黃柏雷丸吳萸江枳實使君子鶴蝨蕪荑生軍摩鬱金楝根皮案熱戀不退下午為甚天明白汗咳嗽痰白脘腹脹痛不時攻撑乃厥陰氣火未平上凌肺金中犯肝胃也青蒿香附橘紅黑山梔桑葉川雅連羚羊角象貝淡芩花檳枳殼另上沉香生黑醜巴豆殼同研末服案古云爍物消物最莫如火火劫津液病成上消上消治法獨取太陰清養既應再宗甘寒佐以微酸正合經旨甘守津還酸甘濟陰之條鮮生地鮮蘆根南北沙參甘草白芍黑玄參烏梅肉真陳阿膠麥冬知母案瘧母必結於左脅者瘧不離膽其絡行於此也夫塊當分聚散散則無形曰瘕氣也聚則不散不移不動曰症血也至於瘧母當假邪濁痰沫而成其根較深其愈益遲潔古東垣每取丸散留中亦由有形之病治以有形即同氣相求之謂耳鱉甲煎丸香砂枳朮丸案瘧連三月有餘汗不通體近加咳嗽噦惡舌苔黃膩乃邪不達輻輳新風防其變驚半夏川雅連吳萸同炒前胡生石膏麻黃枳殼藿梗牛蒡子淡芩廣鬱金橘紅桑葉案血敗之後淋瀝不淨脈數內熱舌苔黃膩是氣虛血熱夾濁內阻也炙龜板腹皮香附淡芩藕節煨木香陳阿膠白芍通草黃柏杜仲木香導滯丸案寒輕熱甚頭痛無汗腰疼項強脈形緊數宛如巨陽初症例用麻桂然時當暮春舌漸干黃溫邪為新邪所伏宜用葛仙翁肘後蔥豉煎之法方不背於先賢苟能應手方免喘驚蔥白頭淡豆豉光杏仁萊蔔子甘菊花秦艽廣鬱金桑葉枝嫩前胡晚蠶沙江枳實案初診花後氣血兩傷外邪易入咳熱半月右脈數大乳兒當此喘驚極速慎之慎之牛蒡橘紅射干楂炭淡豆豉鮮薄荷桑葉前胡杏仁象貝廣鬱金鮮萊蔔二診花後元虛火盛玄府易開衛不固風溫湊襲咳熱痰鳴脈數舌乾辛涼佐以微苦既得其效當仍步其議諺所謂效邊求是也牛蒡子橘紅象貝母射干鬱金枳殼冬桑葉前胡淡豆豉杏仁連翹案寒熱無序咳久不已左脈大舌黃膩邪尚在肺蓋肺胃為衛氣之主尤能剋制肝木自然衛虛則邪易出入肝橫則腹滿脹痛前方既應再當擴充而投蘇子梗前胡桑葉皮半夏川朴烏藥蔞皮橘紅絡鬱金花檳尖摩香附木香沖案脾之大絡名曰大包出淵液下三寸實則身盡痛虛則百節皆縱由乎持重拼傷而起曾經嘔吐見血脾絡大傷最怕身熱之險絲瓜絡子金沸草大川芎降香屑川鬱金生蘇子橘葉絡焦麥芽大腹皮摩三七香附沖服赤芍藥吳萸同炒臺烏藥案不咳而血從上出胃病居多雖云胃為多氣多血之鄉然血由五穀精液所成日生幾何無怪其四維痠軟頭眩耳鳴虛象鳩聚也金沸草猩絳同包血餘炭廣鬱金生蘇子茜草炭竹茹丹皮炭白蒺藜石決明牛膝炭雙鉤鉤杞菊地黃丸十灰丸案氣乃無形宜乎清通痰因氣鬱而阻氣由痰濁窒痹致為喉中作脹脘中痞悶微辛以開微苦以降症象頗退再當損益金沸草陳香櫞半夏腹皮光杏仁老檀屑白芥子瓦楞子竹茹香附雲茯苓枇杷葉案經云木性條達脾司健運健運失司則作脹條達失職則攻撑肝脾既病藏統無權衝任何由而充經傷不行少腹漸滿正所謂氣為血之舟楫氣病則血亦病矣金鈴子玫瑰花撫芎香櫞五靈脂上沉香片連皮檳延胡索砂仁香附摩降香烏藥沖案肝病不犯於脾即犯於胃大腹攻撑脘窒兼嘔犯胃之徵蓋肝屬木脾屬土土衰則木旺自然風動不熄上盛下虛頭暈耳鳴蜂飛鵲起矣製半夏白蒺藜白芍炭陳香櫞廣陳皮雙鉤尖焦麥芽紫石英竹茹酒香附摩降香蘇羅子沖案喉燥雖減氣粗痰黏不時心悸火升頭汗是肝火爍肺濁蘊痰聚之所致也金沸草羚羊角前胡川貝代赭石云茯神玄參香附杜竹茹全栝樓廣鬱金控涎丹
